<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>忘记密码 - AI棱镜</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .forgot-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
        }
        
        .forgot-header {
            padding: 28px 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        
        .forgot-header .logo {
            width: 44px;
            height: 44px;
            background: #007aff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }
        
        .forgot-header .logo i {
            font-size: 22px;
            color: white;
        }
        
        .forgot-header h4 {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 2px;
        }
        
        .forgot-header p {
            color: #86868b;
            font-size: 13px;
        }
        
        .forgot-body {
            padding: 20px 24px;
        }
        
        .form-control {
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            background: #fafafa;
            color: #1d1d1f;
            transition: all 0.2s;
        }
        
        .form-control::placeholder {
            color: #a1a1a6;
        }
        
        .form-control:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
            background: #ffffff;
            color: #1d1d1f;
        }
        
        .form-label {
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
            font-size: 13px;
        }
        
        .tip-box {
            background: #f5f5f7;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 16px;
        }
        
        .tip-box i {
            color: #007aff;
        }
        
        .tip-box p {
            color: #86868b;
            font-size: 12px;
            margin: 0;
        }
        
        .btn-submit {
            background: #007aff;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 500;
            font-size: 14px;
            width: 100%;
            color: white;
            transition: all 0.2s;
        }
        
        .btn-submit:hover {
            background: #0077ed;
        }
        
        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            border: none;
        }
        
        .alert-danger {
            background: #ffebe9;
            color: #ff3b30;
        }
        
        .alert-success {
            background: #dafbe4;
            color: #34c759;
        }
        
        .btn-link-custom {
            color: #007aff;
            text-decoration: none;
            font-size: 13px;
        }
        
        .btn-link-custom:hover {
            color: #0077ed;
        }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="forgot-header">
            <div class="logo">
                <i class="bi bi-key"></i>
            </div>
            <h4>找回密码</h4>
            <p>通过身份证号验证身份</p>
        </div>
        
        <div class="forgot-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" role="alert">
                            <i class="bi bi-{{ 'exclamation-triangle-fill' if category == 'danger' else 'check-circle-fill' if category == 'success' else 'info-circle-fill' }} me-2"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <div class="tip-box">
                <div class="d-flex">
                    <i class="bi bi-info-circle me-2 mt-1"></i>
                    <div>
                        <strong style="font-size: 13px; color: #1d1d1f;">验证说明</strong>
                        <p class="mb-0">请输入您的账号和注册时填写的身份证号码</p>
                    </div>
                </div>
            </div>
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">账号</label>
                    <input type="text" name="username" class="form-control" placeholder="请输入账号" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">身份证号</label>
                    <input type="text" name="id_card" class="form-control" placeholder="请输入18位身份证号码" maxlength="18" required>
                </div>
                <button type="submit" class="btn btn-primary btn-submit">
                    验证身份
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('auth.login') }}" class="btn-link-custom">
                    <i class="bi bi-arrow-left me-1"></i>返回登录
                </a>
            </div>
        </div>
    </div>
</body>
</html>
