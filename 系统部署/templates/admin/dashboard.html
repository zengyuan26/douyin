{% extends "base.html" %}

{% block title %}控制台 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">

    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center page-header-animate">
                <div>
                    <h4 class="mb-1" style="font-weight: 600; color: var(--color-text-primary);">管理中心</h4>
                    <p class="text-muted mb-0" style="font-size: 16px;">系统概览与数据统计</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 快捷操作 -->
    <div class="row g-4 mb-4">
        <div class="col-12">
            <div class="section-card section-card-animate">
                <div class="section-header">
                    <h5 class="section-title"><i class="bi bi-lightning-charge me-2"></i>快捷操作</h5>
                </div>
                <div class="section-body">
                    <div class="row g-3">
                        <div class="col-auto quick-action-animate">
                            <a href="{{ url_for('admin.experts') }}" class="quick-action-btn">
                                <i class="bi bi-robot"></i>
                                <span>专家管理</span>
                            </a>
                        </div>
                        <div class="col-auto quick-action-animate">
                            <a href="{{ url_for('admin.channels') }}" class="quick-action-btn">
                                <i class="bi bi-person-badge"></i>
                                <span>渠道管理</span>
                            </a>
                        </div>
                        <div class="col-auto quick-action-animate">
                            <a href="{{ url_for('admin.clients') }}" class="quick-action-btn">
                                <i class="bi bi-building"></i>
                                <span>客户管理</span>
                            </a>
                        </div>
                        <div class="col-auto quick-action-animate">
                            <a href="{{ url_for('admin.knowledge') }}" class="quick-action-btn">
                                <i class="bi bi-book"></i>
                                <span>知识库</span>
                            </a>
                        </div>
                        <div class="col-auto quick-action-animate">
                            <a href="{{ url_for('admin.templates', type='report') }}" class="quick-action-btn">
                                <svg class="quick-action-icon-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h6"/><path d="M8 9h2"/></svg>
                                <span>模板管理</span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="row g-4 mb-4">
        <div class="col-6 col-lg-4">
            <div class="stat-card stat-card-primary stat-card-animate">
                <div class="stat-icon">
                    <i class="bi bi-people-fill"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number">{{ user_count }}</div>
                    <div class="stat-label">用户总数</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-4">
            <div class="stat-card stat-card-success stat-card-animate">
                <div class="stat-icon">
                    <i class="bi bi-person-badge-fill"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number">{{ channel_count }}</div>
                    <div class="stat-label">渠道数量</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-4">
            <div class="stat-card stat-card-warning stat-card-animate">
                <div class="stat-icon">
                    <i class="bi bi-building-fill"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number">{{ client_count }}</div>
                    <div class="stat-label">客户总数</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-4">
            <div class="stat-card stat-card-info stat-card-animate">
                <div class="stat-icon">
                    <i class="bi bi-robot"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number">{{ expert_count }}</div>
                    <div class="stat-label">专家数量</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-4">
            <div class="stat-card stat-card-purple stat-card-animate">
                <div class="stat-icon">
                    <i class="bi bi-tags-fill"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number">{{ industry_count }}</div>
                    <div class="stat-label">行业分类</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-4">
            <div class="stat-card stat-card-animate" style="--stat-color: #af52de;">
                <div class="stat-icon">
                    <i class="bi bi-file-text-fill"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-number">{{ article_count }}</div>
                    <div class="stat-label">知识库文章</div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
