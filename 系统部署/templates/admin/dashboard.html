{% extends "base.html" %}

{% block title %}控制台 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">

    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center page-header-animate">
                <div>
                    <h4 class="mb-1" style="font-weight: 600; color: var(--color-text-primary);">管理中心</h4>
                    <p class="text-muted mb-0" style="font-size: 16px;">系统概览与数据统计</p>
                </div>
                <div>
                    <a href="{{ url_for('auth.logout') }}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-box-arrow-right me-1"></i>退出登录
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 快捷操作：竖向滚动显示 -->
    <style>
        /* 入口卡片容器：竖向滚动，设置固定高度 */
        .knowledge-cards-container {
            height: calc(100vh - 280px);
            min-height: 400px;
            overflow-y: auto;
            padding-right: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.2) transparent;
        }
        .knowledge-cards-container::-webkit-scrollbar {
            width: 6px;
        }
        .knowledge-cards-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .knowledge-cards-container::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
        }
        .knowledge-cards-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.3);
        }
        
        /* 网格布局：每行4列 */
        .knowledge-cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
        }
        
        /* 平板端：显示3列 */
        @media (max-width: 1199px) {
            .knowledge-cards-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        /* 小平板端：显示2列 */
        @media (max-width: 767px) {
            .knowledge-cards-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        /* 手机端：显示1列 */
        @media (max-width: 480px) {
            .knowledge-cards-grid {
                grid-template-columns: 1fr;
            }
        }
        
        /* 入口卡片样式 */
        .knowledge-entry-cards .stat-card {
            display: block;
        }
        .knowledge-entry-cards .knowledge-entry-card .card-body {
            display: flex !important;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .knowledge-entry-cards .knowledge-entry-card .stat-icon {
            width: 72px;
            height: 72px;
            font-size: 2rem;
            color: var(--stat-color) !important;
        }
        .knowledge-entry-cards .knowledge-entry-card .stat-icon i {
            font-size: 2rem;
        }
    </style>
    
    <div class="knowledge-cards-container">
        <div class="knowledge-cards-grid knowledge-entry-cards">
            <!-- 知识库 -->
            <div>
                <a href="{{ url_for('admin.knowledge') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #ffc107;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-book"></i>
                            </div>
                            <h6 class="mb-1 w-100">知识库</h6>
                            <p class="text-muted mb-0 small w-100">爆款拆解/方法论/规则库</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 渠道管理 -->
            <div>
                <a href="{{ url_for('admin.clients') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #17a2b8;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-person-badge"></i>
                            </div>
                            <h6 class="mb-1 w-100">渠道管理</h6>
                            <p class="text-muted mb-0 small w-100">管理渠道与账号信息</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 客户管理 -->
            <div>
                <a href="{{ url_for('admin.clients') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #28a745;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-building"></i>
                            </div>
                            <h6 class="mb-1 w-100">客户管理</h6>
                            <p class="text-muted mb-0 small w-100">管理企业客户信息</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 专家管理 -->
            <div>
                <a href="{{ url_for('admin.experts') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #007bff;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-robot"></i>
                            </div>
                            <h6 class="mb-1 w-100">专家管理</h6>
                            <p class="text-muted mb-0 small w-100">管理AI专家角色配置</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 模板管理 -->
            <div>
                <a href="{{ url_for('admin.templates', type='report') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #6c757d;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-file-earmark-text"></i>
                            </div>
                            <h6 class="mb-1 w-100">模板管理</h6>
                            <p class="text-muted mb-0 small w-100">报告/文案/脚本模板</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 公开用户管理 -->
            <div>
                <a href="{{ url_for('admin.public_users') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #e91e63;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-people"></i>
                            </div>
                            <h6 class="mb-1 w-100">公开用户</h6>
                            <p class="text-muted mb-0 small w-100">公开平台用户/套餐/配额</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 待处理行业 -->
            <div>
                <a href="{{ url_for('admin.public_pending_industries') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #ff9800;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-hourglass-split"></i>
                            </div>
                            <h6 class="mb-1 w-100">待处理行业</h6>
                            <p class="text-muted mb-0 small w-100">审核新增行业分类</p>
                        </div>
                    </div>
                </a>
            </div>

            <!-- 成本统计 -->
            <div>
                <a href="{{ url_for('admin.public_cost_stats') }}" class="text-decoration-none">
                    <div class="card border-0 shadow-sm h-100 stat-card knowledge-entry-card" style="--stat-color: #9c27b0;">
                        <div class="card-body py-4 d-flex flex-column align-items-center justify-content-center text-center">
                            <div class="stat-icon mb-3">
                                <i class="bi bi-currency-yen"></i>
                            </div>
                            <h6 class="mb-1 w-100">成本统计</h6>
                            <p class="text-muted mb-0 small w-100">LLM调用成本分析</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

</div>
{% endblock %}
