{% extends "base.html" %}

{% block title %}{% if channel %}编辑渠道{% else %}添加渠道{% endif %} - 棱镜AI内容营销系统{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header">
                    <h5 class="mb-0">{% if channel %}编辑渠道{% else %}添加渠道{% endif %}</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <h6 class="text-muted mb-3">账号信息</h6>
                        <div class="mb-3">
                            <label class="form-label">用户名</label>
                            <input type="text" name="username" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">邮箱</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">密码</label>
                            <input type="password" name="password" class="form-control" {% if not channel %}required{% endif %}>
                            {% if channel %}<small class="text-muted">留空则不修改密码</small>{% endif %}
                        </div>
                        
                        <hr>
                        <h6 class="text-muted mb-3">渠道信息</h6>
                        <div class="mb-3">
                            <label class="form-label">渠道名称</label>
                            <input type="text" name="channel_name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">公司名称</label>
                            <input type="text" name="company" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">联系方式</label>
                            <input type="text" name="contact" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea name="description" class="form-control" rows="3"></textarea>
                        </div>
                        
                        <div class="text-end">
                            <a href="{{ url_for('admin.channels') }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
