{% extends "base.html" %}

{% block title %}{% if client %}编辑客户{% else %}新增客户{% endif %} - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="section-card">
                <div class="section-header">
                    <h5 class="section-title">
                        <i class="bi bi-{% if client %}pencil{% else %}plus-lg{% endif %}"></i>
                        {% if client %}编辑客户{% else %}新增客户{% endif %}
                    </h5>
                    <a href="{{ url_for('admin.clients') }}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>返回列表
                    </a>
                </div>
                <div class="section-body">
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-building"></i> 客户名称 <span class="required">*</span>
                            </label>
                            <input type="text" class="form-control" name="name" value="{{ client.name if client else '' }}" required placeholder="请输入客户名称">
                        </div>
                        
                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="bi bi-person-badge"></i> 所属渠道 <span class="required">*</span>
                                </label>
                                <select class="form-select" name="channel_id" required>
                                    <option value="">请选择渠道</option>
                                    {% for channel in channels %}
                                    <option value="{{ channel.id }}" {% if client and client.channel_id == channel.id %}selected{% endif %}>
                                        {{ channel.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">
                                    <i class="bi bi-tags"></i> 行业分类
                                </label>
                                <select class="form-select" name="industry_id">
                                    <option value="">请选择行业</option>
                                    {% for industry in industries %}
                                    <option value="{{ industry.id }}" {% if client and client.industry_id == industry.id %}selected{% endif %}>
                                        {{ industry.icon }} {{ industry.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-briefcase"></i> 业务类型
                            </label>
                            <input type="text" class="form-control" name="business_type" value="{{ client.business_type if client else '' }}" placeholder="如: 桶装水配送">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-person"></i> 联系人
                            </label>
                            <input type="text" class="form-control" name="contact" value="{{ client.contact if client else '' }}" placeholder="请输入联系人姓名">
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">
                                <i class="bi bi-card-text"></i> 客户描述
                            </label>
                            <textarea class="form-control" name="description" rows="4" placeholder="简要描述客户业务...">{{ client.description if client else '' }}</textarea>
                        </div>
                        
                        {% if client %}
                        <div class="mb-4">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if client.is_active %}checked{% endif %}>
                                <label class="form-check-label" for="isActive">启用客户账号</label>
                            </div>
                        </div>
                        {% endif %}
                        
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('admin.clients') }}" class="btn btn-secondary">
                                <i class="bi bi-x-lg me-1"></i>取消
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
