{% extends "base.html" %}

{% block title %}爆款拆解 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-3">
    <!-- 页面标题 -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1">爆款拆解</h5>
                    <p class="text-muted mb-0 small">输入账号链接获取基础信息后，进行内容分析</p>
                </div>
                <div>
                    <a href="{{ url_for('admin.knowledge') }}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i>返回
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab 导航 -->
    <ul class="nav nav-tabs mb-3" id="analysisTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="account-tab" data-bs-toggle="tab" data-bs-target="#account-panel" type="button" role="tab">
                <i class="bi bi-person-badge me-1"></i>账号分析
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="content-tab" data-bs-toggle="tab" data-bs-target="#content-panel" type="button" role="tab" disabled>
                <i class="bi bi-play-btn me-1"></i>内容分析
            </button>
        </li>
    </ul>

    <div class="row g-3">
        <!-- 左侧：输入区域 -->
        <div class="col-lg-5">
            <!-- Tab 内容 -->
            <div class="tab-content" id="analysisTabsContent">
                <!-- 账号分析 Tab -->
                <div class="tab-pane fade show active" id="account-panel" role="tabpanel">
                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-0 py-2 d-flex justify-content-between align-items-center">
                            <h6 class="mb-0">
                                <i class="bi bi-collection me-2 text-primary"></i>账号库
                            </h6>
                            <button class="btn btn-sm btn-primary" id="add-account-btn">
                                <i class="bi bi-plus-lg me-1"></i>新增
                            </button>
                        </div>
                        <div class="card-body py-2">
                            <!-- 账号列表（卡片式） -->
                            <div id="accounts-list" class="row g-2">
                                <div class="col-12 text-center text-muted py-4">加载中...</div>
                            </div>
                            <!-- 分页控件 -->

                                </button>

                                    <i class="bi bi-chevron-right"></i>
                                </button>
                            </div>

                    </div>
                </div>

                <!-- 内容分析 Tab -->

                            <!-- 当前账号信息 -->

                                    </div>
                                    <div class="form-check form-check-inline">

                                        <label class="form-check-label small" for="dim-cover">封面</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input analysis-dimension" type="checkbox" value="topic" id="dim-topic" checked>
                                        <label class="form-check-label small" for="dim-topic">选题</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input analysis-dimension" type="checkbox" value="content" id="dim-content" checked>
                                        <label class="form-check-label small" for="dim-content">内容</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input analysis-dimension" type="checkbox" value="psychology" id="dim-psychology" checked>
                                        <label class="form-check-label small" for="dim-psychology">心理</label>
                                    </div>

                                        <input class="form-check-input analysis-dimension" type="checkbox" value="commercial" id="dim-commercial" checked>

                                    </div>

                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input analysis-dimension" type="checkbox" value="ending" id="dim-ending">
                                        <label class="form-check-label small" for="dim-ending">结尾</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input analysis-dimension" type="checkbox" value="tags" id="dim-tags">
                                        <label class="form-check-label small" for="dim-tags">标签</label>
                                    </div>

                                        <input class="form-check-input analysis-dimension" type="checkbox" value="character" id="dim-character">
                                        <label class="form-check-label small" for="dim-character">人物</label>
                                    </div>

                                        <input class="form-check-input analysis-dimension" type="checkbox" value="content_form" id="dim-content_form">
                                        <label class="form-check-label small" for="dim-content_form">形式</label>
                                    </div>

                                        <input class="form-check-input analysis-dimension" type="checkbox" value="interaction" id="dim-interaction">

                                <div class="col-6">

                                    </div>
                                </div>
                                <div class="col-6">

                                        <div class="small text-muted">账号</div>
                                        <div class="fw-medium" id="result-author">-</div>
                                    </div>
                                </div>
                            </div>
                        </div>

                            <!-- 动态加载分析结果 -->

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// 状态管理
let currentAccount = null;
let analysisResult = null;
let accountAnalysisResult = null;
let selectedRules = new Set();
const ACCOUNT_HISTORY_KEY = 'dismantle_account_history';
const ACCOUNT_HISTORY_MAX = 10;
const HISTORY_PAGE_SIZE = 10;
let historyCurrentPage = 1;

// Tab 元素
const accountTab = document.getElementById('account-tab');
const contentTab = document.getElementById('content-tab');
const accountPanel = document.getElementById('account-panel');
const contentPanel = document.getElementById('content-panel');

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    // 检查 sessionStorage 中是否有保存的账号
    checkSavedAccount();

    // 渲染操作历史
    renderAccountHistory();

    // 加载账号库列表
    loadAccountsList();

    initEventListeners();
});

// 获取操作历史
function getAccountHistory() {
    try {
        const raw = localStorage.getItem(ACCOUNT_HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
    } catch (e) {
        return [];
    }
}

// 删除操作历史项
function deleteHistoryItem(index) {
    let history = getAccountHistory();
    if (index >= 0 && index < history.length) {
        history.splice(index, 1);
        localStorage.setItem(ACCOUNT_HISTORY_KEY, JSON.stringify(history));
        renderAccountHistory();
    }
}

// 添加到操作历史
function addToAccountHistory(account) {
    if (!account || !account.name) return;
    let history = getAccountHistory();
    // 保存完整的账号信息
    const historyItem = {
        name: account.name,
        url: account.url,
        bio: account.bio || '',
        fans_count: account.fans_count || '',
        avatar_description: account.avatar_description || ''
    };
    history = history.filter(h => h.url !== account.url);
    history.unshift(historyItem);
    history = history.slice(0, ACCOUNT_HISTORY_MAX);
    localStorage.setItem(ACCOUNT_HISTORY_KEY, JSON.stringify(history));
    renderAccountHistory();
}

// 渲染操作历史（带分页）
function renderAccountHistory() {
    const listEl = document.getElementById('account-history-list');
    const history = getAccountHistory();
    const paginationEl = document.getElementById('history-pagination');
    const countEl = document.getElementById('history-count');

    // #region debug logging
    const logData = {
        listEl: listEl ? 'exists' : 'null',
        paginationEl: paginationEl ? 'exists' : 'null',
        countEl: countEl ? 'exists' : 'null',
        historyLength: history.length,
        url: window.location.href
    };
    fetch('http://127.0.0.1:7242/ingest/31df6adc-f12d-49d7-92b8-089b897bc558', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({location:'knowledge_dismantle.html:487',message:'renderAccountHistory elements check',data:logData,timestamp:Date.now()})
    }).catch(()=>{});
    // #endregion

    // 更新总数显示
    if (countEl) {
        countEl.textContent = `${history.length}条`;
    }

    if (!listEl) return;

    if (history.length === 0) {
        listEl.innerHTML = '<div class="p-3 text-muted small text-center">暂无历史记录</div>';
        if (paginationEl) {
            paginationEl.classList.add('d-none');
        }
        return;
    }

    // 计算分页
    const totalPages = Math.ceil(history.length / HISTORY_PAGE_SIZE);
    if (historyCurrentPage > totalPages) historyCurrentPage = 1;

    const startIdx = (historyCurrentPage - 1) * HISTORY_PAGE_SIZE;
    const endIdx = Math.min(startIdx + HISTORY_PAGE_SIZE, history.length);
    const pageHistory = history.slice(startIdx, endIdx);

    // 渲染当前页 - 添加删除按钮
    listEl.innerHTML = pageHistory.map((item, i) => `
        <div class="d-flex align-items-center justify-content-between p-2 border-bottom history-item" data-index="${startIdx + i}" style="cursor: pointer;">
            <span class="small text-truncate flex-grow-1 me-2" title="${escapeHtml(item.url)}">${escapeHtml(item.name)}</span>
            <button type="button" class="btn btn-sm btn-outline-danger delete-history-btn" data-index="${startIdx + i}" title="删除">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    `).join('');

    // 添加切换账号按钮
    if (history.length > 0) {
        listEl.innerHTML += `
            <div class="p-2 border-bottom">
                <button type="button" class="btn btn-primary btn-sm w-100" id="switch-to-content-btn">
                    <i class="bi bi-arrow-right-circle me-1"></i>切换账号
                </button>
            </div>
        `;
    }

    // 绑定删除按钮事件
    listEl.querySelectorAll('.delete-history-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
            e.stopPropagation(); // 防止触发列表项点击事件
            const idx = parseInt(this.dataset.index, 10);
            deleteHistoryItem(idx);
        });
    });

    // 绑定点击事件 - 点击列表项切换账号（显示账号分析结果）
    listEl.querySelectorAll('.history-item').forEach(item => {
        item.addEventListener('click', function() {
            const idx = parseInt(this.dataset.index, 10);
            const historyItem = history[idx];
            if (historyItem) selectAccountFromHistoryOnlyShow(historyItem);
        });
    });

    // 绑定切换账号按钮 - 跳转到内容分析 tab
    const switchBtn = document.getElementById('switch-to-content-btn');
    if (switchBtn) {
        switchBtn.addEventListener('click', function() {
            if (currentAccount && currentAccount.name) {
                switchToContentTab();
            }
        });
    }

    // 渲染分页控件
    if (totalPages > 1) {
        if (paginationEl) paginationEl.classList.remove('d-none');
        const pageInfoEl = document.getElementById('history-page-info');
        const prevBtnEl = document.getElementById('history-prev-btn');
        const nextBtnEl = document.getElementById('history-next-btn');
        if (pageInfoEl) pageInfoEl.textContent = `${historyCurrentPage}/${totalPages}`;
        if (prevBtnEl) prevBtnEl.disabled = historyCurrentPage === 1;
        if (nextBtnEl) nextBtnEl.disabled = historyCurrentPage === totalPages;
    } else {
        if (paginationEl) paginationEl.classList.add('d-none');
    }
}

// 上一页
function historyPrevPage() {
    if (historyCurrentPage > 1) {
        historyCurrentPage--;
        renderAccountHistory();
    }
}

// 下一页
function historyNextPage() {
    const history = getAccountHistory();
    const totalPages = Math.ceil(history.length / HISTORY_PAGE_SIZE);
    if (historyCurrentPage < totalPages) {
        historyCurrentPage++;
        renderAccountHistory();
    }
}

function escapeHtml(str) {

    div.textContent = str;
    return div.innerHTML;
}

// 加载账号变更历史
async function loadAccountChangeHistory(accountId) {
    const listEl = document.getElementById('account-history-list');
    if (!listEl) return;

    try {
        const response = await fetch(`/api/knowledge/accounts/${accountId}/history`);
        const data = await response.json();

        if (data.code === 200 && data.data && data.data.length > 0) {
            listEl.innerHTML = data.data.map(item => {
                // 从 change_note 推断变更类型
                const note = item.change_note || '';
                let badgeClass = 'bg-secondary';
                let badgeText = '记录';
                if (note.includes('创建') || note.includes('create')) {
                    badgeClass = 'bg-success';
                    badgeText = '创建';
                } else if (note.includes('删除') || note.includes('delete')) {
                    badgeClass = 'bg-danger';
                    badgeText = '删除';
                } else if (note.includes('更新') || note.includes('修改') || note.includes('update')) {
                    badgeClass = 'bg-warning';
                    badgeText = '更新';
                }

                return `
                <div class="p-2 border-bottom">
                    <div class="small">
                        <span class="badge ${badgeClass}">${badgeText}</span>
                        <span class="text-muted ms-1">${escapeHtml(note) || '-'}</span>
                    </div>
                    <div class="text-muted small">${item.created_at ? new Date(item.created_at).toLocaleString() : '-'}</div>
                </div>
                `;
            }).join('');
        } else {
            listEl.innerHTML = '<div class="text-center text-muted py-3 small">暂无变更记录</div>';
        }
    } catch (e) {
        console.error('加载变更历史失败:', e);
        listEl.innerHTML = '<div class="text-center text-danger py-3 small">加载失败</div>';
    }
}

        document.getElementById('account-core-advantage').value = account.core_advantage || '';
        document.getElementById('account-main-product').value = account.main_product || '';
    } else {
        titleEl.textContent = '新增账号';
        document.getElementById('account-form').reset();
        document.getElementById('account-id').value = '';
    }

    modal.show();
}

// 编辑账号
async function editAccount(accountId) {
    try {
        const response = await fetch(`/api/knowledge/accounts/${accountId}`);
        const data = await response.json();

        if (data.code === 200 && data.data) {
            openAccountModal(data.data);
        } else {
            alert(data.message || '获取账号信息失败');
        }
    } catch (e) {
        alert('获取账号信息失败: ' + e.message);
    }
}

// 删除账号
async function deleteAccount(accountId) {
    if (!confirm('确定要删除这个账号吗？')) return;

    try {
        const response = await fetch(`/api/knowledge/accounts/${accountId}`, {
            method: 'DELETE'
        });
        const data = await response.json();

        if (data.code === 200) {
            alert('删除成功');
            loadAccountsList();
            loadAccountsForSelect();
            // 清空详情
            document.getElementById('account-detail-section').innerHTML = `
                <div class="text-center text-muted py-5">
                    <i class="bi bi-arrow-left-circle fs-1 mb-2"></i>
                    <p>请从左侧选择账号查看详情</p>
                </div>
            `;
        } else {
            alert(data.message || '删除失败');
        }
    } catch (e) {
        alert('删除失败: ' + e.message);
    }
}

// 保存账号
async function saveAccount() {
    const accountId = document.getElementById('account-id').value;
    const name = document.getElementById('account-name').value.trim();
    const platform = document.getElementById('account-platform').value;
    const followers = document.getElementById('account-followers').value.trim();
    const bio = document.getElementById('account-bio').value.trim();

    if (!name) {
        alert('请输入账号名称');
        return;
    }

    const currentData = { followers, bio };

    // 获取详细信息
    const detailData = {
        business_type: document.getElementById('account-business-type').value,
        product_type: document.getElementById('account-product-type').value,
        service_type: document.getElementById('account-service-type').value,
        service_range: document.getElementById('account-service-range').value,
        target_area: document.getElementById('account-target-area').value.trim(),
        brand_type: document.getElementById('account-brand-type').value,
        brand_description: document.getElementById('account-brand-description').value.trim(),
        language_style: document.getElementById('account-language-style').value,
        dialect: document.getElementById('account-dialect').value.trim(),
        core_advantage: document.getElementById('account-core-advantage').value.trim(),
        main_product: document.getElementById('account-main-product').value.trim()
    };

    try {
        let response, data;
        const method = accountId ? 'PUT' : 'POST';
        const endpoint = accountId ? `/api/knowledge/accounts/${accountId}` : '/api/knowledge/accounts';

        response = await fetch(endpoint, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name,
                platform,
                url: '',
                current_data: currentData,
                change_note: accountId ? '手动更新' : '手动创建',
                ...detailData
            })
        });

        data = await response.json();

        if (data.code === 200) {
            alert(accountId ? '账号更新成功！' : '账号保存成功！');
            bootstrap.Modal.getInstance(document.getElementById('accountModal')).hide();
            loadAccountsList();
            loadAccountsForSelect();

            // 获取账号ID（新增时从返回数据获取，编辑时用已有ID）
            const savedAccountId = accountId ? parseInt(accountId) : (data.data?.id);

            if (savedAccountId) {
                // 延迟一点执行，确保数据加载完成
                setTimeout(() => {
                    selectAccount(savedAccountId);
                }, 300);
            }
        } else {
            alert(data.message || '保存失败');
        }
    } catch (e) {
        alert('保存失败: ' + e.message);
    }
}

// 加载账号列表到下拉框（内容分析用）
async function loadAccountsForSelect() {
    try {
        const response = await fetch('/api/knowledge/accounts');
        const data = await response.json();
        if (data.code === 200 && data.data) {
            const select = document.getElementById('manual-content-account');
            if (select) {
                const accounts = data.data.items || data.data;
                select.innerHTML = '<option value="">-- 选择账号 --</option>';
                accounts.forEach(acc => {
                    const option = document.createElement('option');
                    option.value = acc.id;
                    option.textContent = acc.name;
                    select.appendChild(option);
                });
            }
        }
    } catch (e) {
        console.error('加载账号列表失败:', e);
    }
}

// 手动保存内容
async function saveContentManually(e) {
    e.preventDefault();

    const title = document.getElementById('manual-content-title').value.trim();
    const accountId = document.getElementById('manual-content-account').value;
    const contentUrl = document.getElementById('manual-content-url').value.trim();
    const contentType = document.getElementById('manual-content-type').value;
    const description = document.getElementById('manual-content-desc').value.trim();
    const extraDataStr = document.getElementById('manual-content-data').value.trim();

    let contentData = { description };
    if (extraDataStr) {
        try {
            const extraData = JSON.parse(extraDataStr);
            contentData = { ...contentData, ...extraData };
        } catch (e) {
            alert('JSON 格式错误');
            return;
        }
    }

    try {
        const response = await fetch('/api/knowledge/contents', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                title,
                account_id: accountId ? parseInt(accountId) : null,
                content_url: contentUrl,
                content_type: contentType,
                source_type: 'manual',
                content_data: contentData
            })
        });

        const data = await response.json();
        if (data.code === 200) {
            alert('内容保存成功！');
            document.getElementById('content-manual-form').reset();
        } else {
            alert(data.message || '保存失败');
        }
    } catch (e) {
        alert('保存失败: ' + e.message);
    }
}

// 切换账号
function clearAccount() {
    console.log('clearAccount called');

    // 清除 sessionStorage
    sessionStorage.removeItem('dismantle_account');
    currentAccount = null;
    accountAnalysisResult = null;
    analysisResult = null;
    historyCurrentPage = 1;

    // 清除内容分析页的链接输入框
    const contentUrlEl = document.getElementById('manual-content-url');
    if (contentUrlEl) contentUrlEl.value = '';

    // 禁用内容分析 Tab
    disableContentTab();

    // 切换回账号分析 Tab
    switchToAccountTab();

    // 重新渲染历史记录
    renderAccountHistory();

    console.log('账号已清除');
}

// 开始分析内容
async function analyzeContent() {
    const contentUrl = document.getElementById('content-url').value.trim();
    if (!contentUrl) {
        alert('请输入内容链接');
        return;
    }

    // 检查是否有关联账号
    if (!currentAccount) {
        alert('请先获取账号信息');
        switchToAccountTab();
        return;
    }

    // 获取选择的分析维度
    const dimensions = [];
    document.querySelectorAll('.analysis-dimension:checked').forEach(cb => {
        dimensions.push(cb.value);
    });

    if (dimensions.length === 0) {
        alert('请至少选择一个分析维度');
        return;
    }

    // 显示加载状态
    document.getElementById('content-analysis-form').classList.add('d-none');
    document.getElementById('content-loading').classList.remove('d-none');
    document.getElementById('analysis-progress').textContent = '正在获取内容信息...';

    try {
        // 第一步：先用爬虫获取内容信息（浏览器模式）
        const contentInfoResponse = await fetch('/api/knowledge/content/basic-info', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                url: contentUrl,
                use_browser: true  // 使用浏览器模式
            })
        });

        const contentInfoData = await contentInfoResponse.json();
        let contentInfo = null;

        if (contentInfoData.code === 200 && contentInfoData.data) {
            contentInfo = contentInfoData.data;
            document.getElementById('analysis-progress').textContent = '正在分析内容...';
            console.log('获取到内容信息:', contentInfo);
        } else {
            console.warn('获取内容信息失败，将使用纯LLM分析');
        }

        // 第二步：调用分析接口（传入获取到的内容信息）
        const response = await fetch('/api/knowledge/analyze-with-account', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                url: contentUrl,
                modules: dimensions,
                account_info: currentAccount,
                // 传入爬虫获取到的内容信息
                content_info: contentInfo
            })
        });

        const data = await response.json();

        if (data.code === 200 || data.success) {
            analysisResult = data.data || data;
            displayAnalysisResult(analysisResult);
        } else {
            alert(data.message || data.error || '分析失败');
            // 恢复表单
            document.getElementById('content-loading').classList.add('d-none');
            document.getElementById('content-analysis-form').classList.remove('d-none');
        }
    } catch (error) {
        console.error('分析失败:', error);
        alert('分析失败，请稍后重试');
        // 恢复表单
        document.getElementById('content-loading').classList.add('d-none');
        document.getElementById('content-analysis-form').classList.remove('d-none');
    }
}

function displayAnalysisResult(result) {
    document.getElementById('result-empty').classList.add('d-none');
    document.getElementById('result-content').classList.remove('d-none');
    document.getElementById('result-actions').classList.remove('d-none');

    // 基本信息
    document.getElementById('result-title').textContent = result.title || '-';
    document.getElementById('result-author').textContent = result.author || currentAccount?.name || '-';

    // 清空之前的分析结果
    const resultsContainer = document.getElementById('analysis-results');
    resultsContainer.innerHTML = '';

    // 渲染各个维度的分析结果
    if (result.analyses) {
        for (const [dimension, data] of Object.entries(result.analyses)) {
            if (data && data.content) {
                const html = renderDimensionResult(dimension, data);
                resultsContainer.innerHTML += html;
            }
        }
    }

    // 恢复表单显示
    document.getElementById('content-loading').classList.add('d-none');
    document.getElementById('content-analysis-form').classList.remove('d-none');
}

// 渲染单个维度结果
function renderDimensionResult(dimension, data) {
    const titles = {
        'title': '标题分析',
        'cover': '封面分析',
        'topic': '选题分析',
        'content': '内容结构',
        'ending': '结尾分析',
        'tags': '标签分析',
        'psychology': '心理分析',
        'commercial': '商业目的',
        'character': '人物设计',
        'content_form': '内容形式',
        'why_popular': '爆款原因',
        'interaction': '互动数据'
    };

    const icons = {
        'title': 'bi-card-heading',
        'cover': 'bi-image',
        'topic': 'bi-lightbulb',
        'content': 'bi-text-paragraph',
        'ending': 'bi-flag',
        'tags': 'bi-tags',
        'psychology': 'bi-brain',
        'commercial': 'bi-currency-dollar',
        'character': 'bi-person',
        'content_form': 'bi-layout-text-window-reverse',
        'why_popular': 'bi-fire',
        'interaction': 'bi-hand-thumbs-up'
    };

    const title = titles[dimension] || dimension;
    const icon = icons[dimension] || 'bi-check-circle';

    // 格式化内容
    let contentHtml = data.content;
    if (data.score !== undefined) {
        contentHtml = `<div class="mb-2"><span class="badge bg-${getScoreColor(data.score)}">评分: ${data.score}/10</span></div>` + contentHtml;
    }

    return `
        <div class="mb-3">
            <h6 class="text-muted mb-2">
                <i class="bi ${icon} me-1"></i>${title}
            </h6>
            <div class="p-3 bg-light rounded">
                ${contentHtml}
            </div>
        </div>
    `;
}

// 根据评分返回颜色
function getScoreColor(score) {
    if (score >= 8) return 'success';
    if (score >= 6) return 'primary';
    if (score >= 4) return 'warning';
    return 'danger';
}

// 显示导入模态框
async function showImportModal() {
    const modal = new bootstrap.Modal(document.getElementById('importModal'));
    modal.show();

    // 加载规则列表
    try {
        const response = await fetch('/api/knowledge/rules');
        const data = await response.json();

        if (data.code === 200) {
            const rulesList = document.getElementById('rules-list');
            rulesList.innerHTML = '';

            if (data.data.length === 0) {
                rulesList.innerHTML = '<div class="p-3 text-muted">暂无规则</div>';
            } else {
                data.data.forEach(rule => {
                    const div = document.createElement('div');
                    div.className = 'form-check p-2 border-bottom';
                    div.innerHTML = `
                        <input class="form-check-input" type="checkbox" value="${rule.id}" id="rule-${rule.id}">
                        <label class="form-check-label w-100" for="rule-${rule.id}">
                            <div class="fw-medium">${rule.name}</div>
                            <div class="small text-muted">${rule.description || '无描述'}</div>
                        </label>
                    `;
                    div.querySelector('input').addEventListener('change', function() {
                        if (this.checked) {
                            selectedRules.add(this.value);
                        } else {
                            selectedRules.delete(this.value);
                        }
                    });
                    rulesList.appendChild(div);
                });
            }
        }
    } catch (error) {
        console.error('加载规则列表失败:', error);
    }
}

// 导入规则
async function importRules() {
    if (selectedRules.size === 0) {
        alert('请选择要导入的规则');
        return;
    }

    try {
        const response = await fetch('/api/knowledge/import-rules', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                rule_ids: Array.from(selectedRules),
                content: JSON.stringify(analysisResult)
            })
        });

        const data = await response.json();

        if (data.code === 200) {
            alert('导入成功');
            bootstrap.Modal.getInstance(document.getElementById('importModal')).hide();
        } else {
            alert(data.error || '导入失败');
        }
    } catch (error) {
        console.error('导入规则失败:', error);
        alert('导入失败，请稍后重试');
    }
}

// 导出结果
function exportResult() {
    if (!analysisResult) {
        alert('没有可导出的结果');
        return;
    }

    const content = JSON.stringify(analysisResult, null, 2);
    const blob = new Blob([content], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `analysis_result_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
}
