{% extends "base.html" %}

{% block title %}分析维度管理 - AI棱镜{% endblock %}

{% block content %}
<!-- 本页允许整页滚动，避免内容被裁切 -->
<div class="container-fluid py-4 analysis-dimensions-page">
    <!-- 列表视图：卡片网格 -->
    <div id="dimension-list-view">
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center page-header-animate">
                    <div>
                        <h4 class="mb-1">分析维度管理</h4>
                        <p class="text-muted mb-0">配置爆款拆解的分析维度，按一级分类Tab切换，点击卡片查看该分类下的维度</p>
                    </div>
                    <div class="btn-animate d-flex justify-content-end">
                        <button type="button" class="btn btn-outline-primary btn-lg me-3" id="init-dimension-btn" title="初始化默认维度">
                            <i class="bi bi-plus-circle me-1"></i>初始化
                        </button>
                        <a href="{{ url_for('admin.knowledge') }}" class="btn btn-outline-secondary btn-lg">
                            <i class="bi bi-arrow-left me-1"></i>返回
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 导航 -->
        <ul class="nav nav-tabs mb-4" id="category-tabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-account" data-bs-toggle="tab" data-bs-target="#pane-account" type="button" role="tab" aria-selected="true">
                    <i class="bi bi-person-badge me-1"></i>账号分析
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-content" data-bs-toggle="tab" data-bs-target="#pane-content" type="button" role="tab" aria-selected="false">
                    <i class="bi bi-file-text me-1"></i>内容分析
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-methodology" data-bs-toggle="tab" data-bs-target="#pane-methodology" type="button" role="tab" aria-selected="false">
                    <i class="bi bi-book me-1"></i>方法论
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-super_positioning" data-bs-toggle="tab" data-bs-target="#pane-super_positioning" type="button" role="tab" aria-selected="false">
                    <i class="bi bi-bullseye me-1"></i>超级定位
                </button>
            </li>
        </ul>

        <!-- Tab 内容 -->
        <div class="tab-content" id="category-tab-content">
            <div class="tab-pane fade show active" id="pane-account" role="tabpanel">
                <div class="row dimension-cards-container" data-category="account">
                    <div class="col-12 text-center text-muted py-5"><div class="spinner-border" role="status"></div></div>
                </div>
            </div>
            <div class="tab-pane fade" id="pane-content" role="tabpanel">
                <div class="row dimension-cards-container" data-category="content">
                    <div class="col-12 text-center text-muted py-5"><div class="spinner-border" role="status"></div></div>
                </div>
            </div>
            <div class="tab-pane fade" id="pane-methodology" role="tabpanel">
                <div class="row dimension-cards-container" data-category="methodology">
                    <div class="col-12 text-center text-muted py-5"><div class="spinner-border" role="status"></div></div>
                </div>
            </div>
            <div class="tab-pane fade" id="pane-super_positioning" role="tabpanel">
                <div class="row dimension-cards-container" data-category="super_positioning">
                    <div class="col-12 text-center text-muted py-5"><div class="spinner-border" role="status"></div></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情视图：点击卡片后显示该二级分类下的维度列表 -->
    <div id="dimension-detail-view" class="d-none">
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center">
                        <button type="button" class="btn btn-outline-secondary btn-lg me-3" id="detail-back-btn" title="返回卡片列表">
                            <i class="bi bi-arrow-left"></i>
                        </button>
                        <div>
                            <h4 class="mb-1" id="detail-title">二级分类</h4>
                            <p class="text-muted mb-0">管理该分类下的分析维度</p>
                        </div>
                    </div>
                    <div>
                        <button type="button" class="btn btn-primary btn-lg" id="detail-add-btn" title="新增维度">
                            <i class="bi bi-plus-lg me-1"></i>新增维度
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-0">
                <div id="detail-dimensions-list" class="list-group list-group-flush">
                    <!-- 维度列表由 JS 渲染 -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 新增/编辑维度弹窗：不再包含排序 -->
<div class="modal fade" id="dimensionModal" tabindex="-1" aria-labelledby="dimensionModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" style="max-width: 1000px;">
        <div class="modal-content">
            <div class="modal-header d-flex justify-content-between align-items-center">
                <h5 class="modal-title" id="dimensionModalLabel">新增维度</h5>
                <button type="button" class="btn btn-primary btn-sm" id="save-dimension-btn">保存</button>
            </div>
            <div class="modal-body py-3">
                <form id="dimension-form">
                    <input type="hidden" id="dimension-id">
                    <input type="hidden" id="dimension-code">

                    <div class="row g-3">
                        <!-- 第一行：维度名称（占左） + 一级+二级分类（占右） -->
                        <div class="col-12">
                            <div class="row g-3">
                                <div class="col-4">
                                    <label class="form-label" for="dimension-name">维度名称 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" id="dimension-name" required placeholder="如：辨识度、核心关键词、易记性">
                                </div>
                                <div class="col-4">
                                    <label class="form-label" for="dimension-category">一级分类</label>
                                    <select class="form-select" id="dimension-category" required>
                                        <option value="">请选择</option>
                                        <option value="account">账号分析</option>
                                        <option value="content">内容分析</option>
                                        <option value="methodology">方法论</option>
                                        <option value="super_positioning">超级定位</option>
                                    </select>
                                </div>
                                <div class="col-4">
                                    <label class="form-label" for="dimension-sub-category">二级分类</label>
                                    <select class="form-select" id="dimension-sub-category">
                                        <option value="">请选择</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- 第二行：描述、示例、识别技巧、适用人群 -->
                        <div class="col-6">
                            <label class="form-label" for="dimension-description">描述（定义）</label>
                            <textarea class="form-control" id="dimension-description" rows="3" placeholder="简短说明这个维度分析什么"></textarea>
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="dimension-examples">示例</label>
                            <textarea class="form-control" id="dimension-examples" rows="3" placeholder="多个示例用 | 分隔，如：关注送一罐|私信咨询|到店试吃"></textarea>
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="dimension-usage-tips">识别技巧</label>
                            <textarea class="form-control" id="dimension-usage-tips" rows="3" placeholder="如：行动号召是让用户做什么，联系方式是留电话/微信/地址"></textarea>
                        </div>
                        <div class="col-6">
                            <label class="form-label" for="dimension-applicable-audience">适用人群</label>
                            <textarea class="form-control" id="dimension-applicable-audience" rows="3" placeholder="适用该维度的人群，用 | 分隔，如：创业者|企业家|B2B服务"></textarea>
                        </div>

                        <!-- 市场洞察专用区域 -->
                        <div class="col-12" id="market-insight-section" style="display: none;">
                            <hr>
                            <div class="alert alert-info py-2 mb-3">
                                <i class="bi bi-info-circle me-1"></i>市场洞察专用配置：设置此维度的触发条件和内容模板
                            </div>
                            <div class="row g-3">
                                <!-- 重要性 -->
                                <div class="col-4">
                                    <label class="form-label" for="dimension-importance">重要性</label>
                                    <select class="form-select" id="dimension-importance">
                                        <option value="1">⭐ 基础 (1)</option>
                                        <option value="2">⭐⭐ 一般 (2)</option>
                                        <option value="3">⭐⭐⭐ 重要 (3)</option>
                                        <option value="4">⭐⭐⭐⭐ 很重要 (4)</option>
                                        <option value="5">⭐⭐⭐⭐⭐ 核心 (5)</option>
                                    </select>
                                </div>
                                <!-- 触发条件：业务类型 -->
                                <div class="col-4">
                                    <label class="form-label" for="trigger-business-types">触发：业务类型</label>
                                    <select class="form-select" id="trigger-business-types" multiple data-placeholder="不限制">
                                        <option value="service">服务类</option>
                                        <option value="product">产品类</option>
                                        <option value="both">两者都有</option>
                                    </select>
                                </div>
                                <!-- 触发条件：搜前搜后 -->
                                <div class="col-4">
                                    <label class="form-label" for="trigger-search-stage">触发：搜索阶段</label>
                                    <select class="form-select" id="trigger-search-stage">
                                        <option value="">不限制</option>
                                        <option value="pre_search">搜前阶段</option>
                                        <option value="mid_search">搜中阶段</option>
                                        <option value="post_search">搜后阶段</option>
                                        <option value="all">全部阶段</option>
                                    </select>
                                </div>
                                <!-- 触发条件：特殊人群 -->
                                <div class="col-12">
                                    <label class="form-label">触发：特殊人群</label>
                                    <div class="row g-2">
                                        <div class="col-auto">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="trigger-has-baby">
                                                <label class="form-check-label" for="trigger-has-baby">涉及宝宝（奶粉/纸尿裤等）</label>
                                            </div>
                                        </div>
                                        <div class="col-auto">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="trigger-has-elderly">
                                                <label class="form-check-label" for="trigger-has-elderly">涉及老人（保健品/轮椅等）</label>
                                            </div>
                                        </div>
                                        <div class="col-auto">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="trigger-has-enterprise">
                                                <label class="form-check-label" for="trigger-has-enterprise">有企业客户（B端）</label>
                                            </div>
                                        </div>
                                        <div class="col-auto">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="trigger-is-gift">
                                                <label class="form-check-label" for="trigger-is-gift">礼品场景</label>
                                            </div>
                                        </div>
                                        <div class="col-auto">
                                            <div class="form-check">
                                                <input class="form-check-input" type="checkbox" id="trigger-is-pets">
                                                <label class="form-check-label" for="trigger-is-pets">涉及宠物</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <!-- 内容模板 -->
                                <div class="col-12">
                                    <label class="form-label" for="dimension-content-template">内容模板（发给LLM的内容，支持变量：{examples}、{usage_tips}）</label>
                                    <textarea class="form-control" id="dimension-content-template" rows="6" placeholder="【维度名称】
定义说明
示例：{examples}
区分技巧：{usage_tips}"></textarea>
                                    <small class="text-muted">留空则使用默认格式：描述+示例+区分技巧</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
/* 分析维度管理页：允许整页滚动，去掉底部粉色色块 */
.analysis-dimensions-page { min-height: auto; overflow: visible; }
body:has(.analysis-dimensions-page) {
    overflow-y: auto;
    overflow-x: hidden;
    background: #f5f5f7 !important;
    background-attachment: scroll !important;
    animation: none !important;
}
main.main-content:has(.analysis-dimensions-page) {
    overflow: visible;
    min-height: auto;
    background: #f5f5f7 !important;
}
.bg-purple { background-color: #6f42c1 !important; }
.btn-outline-purple { color: #6f42c1; border-color: #6f42c1; }
.btn-outline-purple:hover { background-color: #6f42c1; color: white; }
.bg-danger-custom { background-color: #dc3545 !important; }
/* 卡片仅显示二级分类名，整卡可点击 */
.dimension-card-clickable { cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease; }
.dimension-card-clickable:hover { transform: translateY(-2px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,.1) !important; }
.detail-dimension-item { transition: background-color 0.15s ease; }
.detail-dimension-item:hover { background-color: rgba(0,0,0,.03); }

/* 弹窗宽度调大，内容区可滚动 */
#dimensionModal .modal-body {
    max-height: 70vh;
    overflow-y: auto;
}

/* 拖拽排序样式 */
.dimension-cards-container.sorting { min-height: 100px; }
.dimension-card-wrapper {
    transition: transform 0.2s ease, opacity 0.2s ease;
    cursor: grab;
}
.dimension-card-wrapper:active { cursor: grabbing; }
.dimension-card-wrapper.dragging {
    opacity: 0.4;
}
.dimension-card-wrapper.drag-over {
    transform: scale(1.02);
}
.dimension-card-wrapper.drag-over .card {
    border: 2px dashed #0d6efd;
}
.dimension-card-wrapper .drag-handle {
    cursor: grab;
    opacity: 0.4;
    transition: opacity 0.15s ease;
}
.dimension-card-wrapper:hover .drag-handle { opacity: 0.8; }
.dimension-card-wrapper .drag-handle:active { cursor: grabbing; }
.dimension-card-wrapper .card { height: 100%; }
</style>
<!-- 外部 JS 模块 -->
<script src="{{ url_for('static', filename='admin/js/utils.js') }}"></script>
<script src="{{ url_for('static', filename='admin/js/api.js') }}"></script>
<script src="{{ url_for('static', filename='admin/js/dimensions.js') }}"></script>
<script>
// 一级分类图标与样式
const CATEGORY_META = {
    'account':   { name: '账号分析',   icon: 'bi-person-badge',  color: 'primary' },
    'content':   { name: '内容分析',   icon: 'bi-file-text',     color: 'success' },
    'methodology': { name: '方法论', icon: 'bi-book',            color: 'purple' },
    'super_positioning': { name: '超级定位', icon: 'bi-bullseye', color: 'danger' }
};

// 二级分类选项（用于表单联动）
const DIMENSION_CATEGORIES = {
    'account': {
        'name': '账号分析',
        'sub_categories': {
            'nickname_analysis': '昵称分析',
            'bio_analysis': '简介分析',
            'account_positioning': '账号定位',
            'market_analysis': '市场分析',
            'operation_planning': '运营规划',
            'keyword_library': '关键词库'
        }
    },
    'content': {
        'name': '内容分析',
        'sub_categories': {
            'title': '标题',
            'hook': '开头钩子',
            'content_body': '内容',
            'visual_design': '视觉设计',
            'ending': '结尾'
        }
    },
    'methodology': {
        'name': '方法论',
        'sub_categories': {
            'applicable_scenario': '适用场景',
            'applicable_audience': '适用人群'
        }
    },
    'super_positioning': {
        'name': '超级定位',
        'sub_categories': {
            'persona': '人群画像',
            'market_insight': '市场洞察'
        }
    }
};

// 当前分组数据与详情视图所在分组（用于详情页刷新）
var groupedDataCache = [];
var currentDetailGroup = null;
var currentPage = 1;
var pageSize = 5;

// 从sessionStorage恢复详情页状态
function restoreDetailState() {
    try {
        var saved = sessionStorage.getItem('dimensionDetailState');
        if (saved) {
            var state = JSON.parse(saved);
            // 切换到对应的一级分类Tab
            var tabBtn = document.querySelector('#tab-' + state.category);
            if (tabBtn) {
                var tab = new bootstrap.Tab(tabBtn);
                tab.show();
            }
            return state;
        }
    } catch (e) {}
    return null;
}

// 保存详情页状态到sessionStorage
function saveDetailState(group) {
    try {
        sessionStorage.setItem('dimensionDetailState', JSON.stringify({
            category: group.category,
            sub_category: group.sub_category,
            sub_category_name: group.sub_category_name
        }));
    } catch (e) {}
}

// 清除sessionStorage中的详情页状态
function clearDetailState() {
    try {
        sessionStorage.removeItem('dimensionDetailState');
        console.log('[DEBUG] clearDetailState called, sessionStorage cleared');
    } catch (e) {}
}

document.addEventListener('DOMContentLoaded', function() {
    console.log('[DEBUG] DOMContentLoaded fired');

    // 先尝试恢复详情页状态（如果有保存的状态）
    var savedState = restoreDetailState();

    if (savedState) {
        // 如果有保存的状态，显示详情视图
        console.log('[DEBUG] Restored state, showing detail view for:', savedState.sub_category_name);
        document.getElementById('dimension-list-view').classList.add('d-none');
        document.getElementById('dimension-detail-view').classList.remove('d-none');

        // 加载数据后显示详情
        loadGroupedDimensions().then(function() {
            // 找到对应的分组并显示详情
            var group = findGroupByCategory(savedState.category, savedState.sub_category);
            if (group) {
                showDetailView(group);
            }
        });
    } else {
        // 没有保存的状态，显示列表视图
        console.log('[DEBUG] No saved state, showing list view');
        document.getElementById('dimension-list-view').classList.remove('d-none');
        document.getElementById('dimension-detail-view').classList.add('d-none');
        currentDetailGroup = null;

        loadGroupedDimensions();
    }

    document.getElementById('dimension-category').addEventListener('change', function() {
        updateSubCategoryOptions(this.value);
    });
    document.getElementById('save-dimension-btn').addEventListener('click', saveDimension);
    document.getElementById('init-dimension-btn').addEventListener('click', handleInitDimensions);
    document.getElementById('detail-back-btn').addEventListener('click', function() {
        document.getElementById('dimension-list-view').classList.remove('d-none');
        document.getElementById('dimension-detail-view').classList.add('d-none');
        currentDetailGroup = null;
        currentPage = 1;
        clearDetailState();
    });
    document.getElementById('detail-add-btn').addEventListener('click', function() {
        if (currentDetailGroup) openDimensionModal(null, currentDetailGroup.category, currentDetailGroup.sub_category || '');
    });
});

async function loadGroupedDimensions(clearState = true) {
    // 根据参数决定是否清除旧的详情页状态
    if (clearState) {
        clearDetailState();
        currentDetailGroup = null;
    }

    try {
        const response = await fetch('/admin/api/analysis-dimensions/grouped', {
            headers: { 'X-Requested-With': 'XMLHttpRequest', 'Accept': 'application/json' }
        });
        if (!response.ok) {
            document.querySelectorAll('.dimension-cards-container').forEach(function(c) {
                c.innerHTML = '<div class="col-12 text-center text-danger py-4">加载失败</div>';
            });
            return;
        }
        const result = await response.json();
        if (!result.success) {
            document.querySelectorAll('.dimension-cards-container').forEach(function(c) {
                c.innerHTML = '<div class="col-12 text-center text-danger py-4">' + (result.message || '加载失败') + '</div>';
            });
            return;
        }
        groupedDataCache = result.data || [];
        renderCards(groupedDataCache);
    } catch (e) {
        document.querySelectorAll('.dimension-cards-container').forEach(function(c) {
            c.innerHTML = '<div class="col-12 text-center text-danger py-4">加载失败: ' + e.message + '</div>';
        });
    }
}

// 根据分类和子分类查找分组
function findGroupByCategory(category, subCategory) {
    return groupedDataCache.find(function(g) {
        return g.category === category && g.sub_category === subCategory;
    });
}

// 按一级分类分别渲染到对应的 tab 容器
function renderCards(groups) {
    if (!groups || groups.length === 0) {
        document.querySelectorAll('.dimension-cards-container').forEach(function(container) {
            container.innerHTML = '<div class="col-12 text-center text-muted py-4">暂无分类数据</div>';
        });
        return;
    }
    // 按一级分类分组
    var categories = ['account', 'content', 'methodology', 'super_positioning'];
    categories.forEach(function(cat) {
        var container = document.querySelector('.dimension-cards-container[data-category="' + cat + '"]');
        if (!container) return;
        var filtered = groups.filter(function(g) { return g.category === cat; });
        if (filtered.length === 0) {
            container.innerHTML = '<div class="col-12 text-center text-muted py-4">暂无' + CATEGORY_META[cat].name + '数据</div>';
            return;
        }
        var html = filtered.map(function(g, index) {
            var meta = CATEGORY_META[g.category] || { icon: 'bi-circle', color: 'secondary' };
            // dimensions 需要用 encodeURIComponent 编码，避免 HTML 转义破坏 JSON
            var dimensionsJson = encodeURIComponent(JSON.stringify(g.dimensions || []));
            return (
                '<div class="col-12 col-sm-6 col-lg-4 col-xl-3 mb-4 dimension-card-wrapper" draggable="true" data-category="' + escapeHtml(g.category) + '" data-sub="' + escapeHtml(g.sub_category || '') + '" data-sort="' + index + '">' +
                '  <div class="card border-0 shadow-sm dimension-card-clickable h-100" data-category="' + escapeHtml(g.category) + '" data-sub="' + escapeHtml(g.sub_category || '') + '" data-name="' + escapeHtml(g.sub_category_name) + '" data-dimensions="' + dimensionsJson + '">' +
                '    <div class="card-body d-flex align-items-center justify-content-center py-4 position-relative">' +
                '      <span class="drag-handle position-absolute start-0 ms-2 text-muted" title="拖拽排序"><i class="bi bi-grip-vertical"></i></span>' +
                '      <h6 class="mb-0">' +
                '        <i class="bi ' + meta.icon + ' text-' + meta.color + ' me-2"></i>' + escapeHtml(g.sub_category_name) +
                '      </h6>' +
                '    </div>' +
                '  </div>' +
                '</div>'
            );
        }).join('');
        container.innerHTML = html;
    });

    // 绑定卡片点击事件（点击卡片时不要触发拖拽）
    document.querySelectorAll('.dimension-card-clickable').forEach(function(card) {
        card.addEventListener('click', function(e) {
            console.log('[DEBUG] Card clicked');
            // 如果点击的是拖拽手柄，不触发卡片点击
            if (e.target.closest('.drag-handle')) return;
            var cat = this.getAttribute('data-category');
            var sub = this.getAttribute('data-sub') || '';
            var name = this.getAttribute('data-name');
            var dims = [];
            try { dims = JSON.parse(decodeURIComponent(this.getAttribute('data-dimensions') || '[]')); } catch (e) {}
            console.log('[DEBUG] Parsed dimensions:', dims);
            showDetailView({ category: cat, sub_category: sub, sub_category_name: name, dimensions: dims });
        });
    });

    // 初始化拖拽排序
    initDragAndDrop();
}

function showDetailView(group) {
    console.log('[DEBUG] showDetailView called with:', group);
    currentDetailGroup = group;
    currentPage = 1;  // 重置分页
    saveDetailState(group);  // 保存状态
    document.getElementById('dimension-list-view').classList.add('d-none');
    document.getElementById('dimension-detail-view').classList.remove('d-none');
    document.getElementById('detail-title').textContent = group.sub_category_name || '未命名分类';
    renderDetailDimensions(group.dimensions || [], group.category);
}

function renderDetailDimensions(dimensions, category) {
    const meta = CATEGORY_META[category] || { icon: 'bi-circle', color: 'primary' };
    const container = document.getElementById('detail-dimensions-list');
    if (!dimensions || dimensions.length === 0) {
        container.innerHTML = '<div class="list-group-item text-muted text-center py-5">暂无维度，点击右上角「新增维度」添加</div>';
        return;
    }
    
    // 计算分页
    const totalItems = dimensions.length;
    const totalPages = Math.ceil(totalItems / pageSize);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    const pageItems = dimensions.slice(start, end);
    
    // 渲染维度列表
    container.innerHTML = pageItems.map(function(d) {
        return (
            '<div class="list-group-item detail-dimension-item d-flex align-items-center justify-content-between py-3">' +
            '  <div class="d-flex align-items-center flex-grow-1 min-width-0">' +
            '    <i class="bi ' + (d.icon || meta.icon) + ' me-3 text-' + meta.color + '"></i>' +
            '    <div class="min-width-0">' +
            '      <span>' + escapeHtml(d.name) + '</span>' +
            '    </div>' +
            '  </div>' +
            '  <div class="btn-group btn-group-sm">' +
            '    <button class="btn btn-outline-primary" onclick="editDimension(' + d.id + ')" title="编辑"><i class="bi bi-pencil"></i></button>' +
            '    <button class="btn btn-outline-danger" onclick="deleteDimension(' + d.id + ')" title="删除"><i class="bi bi-trash"></i></button>' +
            '  </div>' +
            '</div>'
        );
    }).join('');
    
    // 渲染分页控件
    if (totalPages > 1) {
        container.innerHTML += renderPagination(totalPages, currentPage, totalItems, start, end);
    }
}

function renderPagination(totalPages, currentPage, totalItems, start, end) {
    var html = '<div class="list-group-item py-3 d-flex justify-content-between align-items-center">';
    html += '<span class="text-muted small">显示 ' + (start + 1) + '-' + Math.min(end, totalItems) + ' 条，共 ' + totalItems + ' 条</span>';
    html += '<nav><ul class="pagination pagination-sm mb-0">';
    
    // 上一页
    if (currentPage > 1) {
        html += '<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="goToPage(' + (currentPage - 1) + ')">上一页</a></li>';
    } else {
        html += '<li class="page-item disabled"><span class="page-link">上一页</span></li>';
    }
    
    // 页码
    for (var i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            html += '<li class="page-item active"><span class="page-link">' + i + '</span></li>';
        } else {
            html += '<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="goToPage(' + i + ')">' + i + '</a></li>';
        }
    }
    
    // 下一页
    if (currentPage < totalPages) {
        html += '<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="goToPage(' + (currentPage + 1) + ')">下一页</a></li>';
    } else {
        html += '<li class="page-item disabled"><span class="page-link">下一页</span></li>';
    }
    
    html += '</ul></nav></div>';
    return html;
}

function goToPage(page) {
    currentPage = page;
    renderDetailDimensions(currentDetailGroup.dimensions || [], currentDetailGroup.category);
}

function refreshDetailView() {
    if (!currentDetailGroup) return;
    var g = groupedDataCache.find(function(x) {
        return x.category === currentDetailGroup.category && (x.sub_category || '') === (currentDetailGroup.sub_category || '');
    });
    if (g) {
        currentDetailGroup = g;
        document.getElementById('detail-title').textContent = g.sub_category_name || '未命名分类';
        renderDetailDimensions(g.dimensions || [], g.category);
    }
}

function escapeHtml(s) {
    if (s == null) return '';
    var div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
}

function openDimensionModal(dimension, prefillCategory, prefillSubCategory) {
    const modal = new bootstrap.Modal(document.getElementById('dimensionModal'));
    const form = document.getElementById('dimension-form');
    form.reset();

    const categorySelect = document.getElementById('dimension-category');
    const marketInsightSection = document.getElementById('market-insight-section');

    if (dimension) {
        document.getElementById('dimensionModalLabel').textContent = '编辑维度';
        document.getElementById('dimension-id').value = dimension.id;
        document.getElementById('dimension-name').value = dimension.name;
        document.getElementById('dimension-code').value = dimension.code || '';
        categorySelect.value = dimension.category;
        categorySelect.disabled = true;
        updateSubCategoryOptions(dimension.category, dimension.sub_category);
        document.getElementById('dimension-description').value = dimension.description || '';
        document.getElementById('dimension-examples').value = dimension.examples || '';
        document.getElementById('dimension-usage-tips').value = dimension.usage_tips || '';
        document.getElementById('dimension-applicable-audience').value = dimension.applicable_audience || '';

        // 填充市场洞察字段
        const isMarketInsight = dimension.sub_category === 'market_insight';
        marketInsightSection.style.display = isMarketInsight ? 'block' : 'none';

        if (isMarketInsight) {
            // 重要性
            document.getElementById('dimension-importance').value = dimension.importance || 1;

            // 触发条件
            const trigger = dimension.trigger_conditions || {};
            const btSelect = document.getElementById('trigger-business-types');
            if (btSelect && trigger.business_types) {
                Array.from(btSelect.options).forEach(opt => {
                    opt.selected = trigger.business_types.includes(opt.value);
                });
            }
            document.getElementById('trigger-search-stage').value = trigger.search_stage || '';

            // 特殊人群复选框
            document.getElementById('trigger-has-baby').checked = trigger.has_baby || false;
            document.getElementById('trigger-has-elderly').checked = trigger.has_elderly || false;
            document.getElementById('trigger-has-enterprise').checked = trigger.has_enterprise || false;
            document.getElementById('trigger-is-gift').checked = trigger.is_gift || false;
            document.getElementById('trigger-is-pets').checked = trigger.is_pets || false;

            // 内容模板
            document.getElementById('dimension-content-template').value = dimension.content_template || '';
        }
    } else {
        document.getElementById('dimensionModalLabel').textContent = '新增维度';
        document.getElementById('dimension-id').value = '';
        categorySelect.disabled = false;
        marketInsightSection.style.display = 'none';

        if (prefillCategory) {
            categorySelect.value = prefillCategory;
            categorySelect.disabled = true;
            updateSubCategoryOptions(prefillCategory, prefillSubCategory || '');

            // 如果是市场洞察，显示配置区域
            if (prefillCategory === 'super_positioning' && prefillSubCategory === 'market_insight') {
                marketInsightSection.style.display = 'block';
            }
        } else {
            categorySelect.value = '';
        }
    }

    modal.show();
}

// 监听一级分类变化，显示/隐藏市场洞察配置
document.getElementById('dimension-category').addEventListener('change', function() {
    const marketInsightSection = document.getElementById('market-insight-section');
    const subCategorySelect = document.getElementById('dimension-sub-category');

    if (this.value === 'super_positioning' && subCategorySelect.value === 'market_insight') {
        marketInsightSection.style.display = 'block';
    } else {
        marketInsightSection.style.display = 'none';
    }
});

// 监听二级分类变化
document.getElementById('dimension-sub-category').addEventListener('change', function() {
    const marketInsightSection = document.getElementById('market-insight-section');
    const categorySelect = document.getElementById('dimension-category');

    if (categorySelect.value === 'super_positioning' && this.value === 'market_insight') {
        marketInsightSection.style.display = 'block';
    } else {
        marketInsightSection.style.display = 'none';
    }
});

function updateSubCategoryOptions(category, selectedSubCategory) {
    var select = document.getElementById('dimension-sub-category');
    select.innerHTML = '<option value="">请选择</option>';
    if (category && DIMENSION_CATEGORIES[category]) {
        var subCategories = DIMENSION_CATEGORIES[category].sub_categories;
        for (var key in subCategories) {
            var opt = document.createElement('option');
            opt.value = key;
            opt.textContent = subCategories[key];
            if (key === selectedSubCategory) opt.selected = true;
            select.appendChild(opt);
        }
    }
}

async function editDimension(id) {
    try {
        var response = await fetch('/admin/api/analysis-dimensions/' + id, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        var result = await response.json();
        if (result.success) openDimensionModal(result.data);
        else alert('加载失败: ' + result.message);
    } catch (e) {
        alert('加载失败: ' + e.message);
    }
}

async function deleteDimension(id) {
    if (!confirm('确定要删除这个维度吗？此操作不可恢复。')) {
        return;
    }
    try {
        var response = await fetch('/admin/api/analysis-dimensions/' + id, {
            method: 'DELETE',
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        var result = await response.json();
        if (result.success) {
            showToast('删除成功', 'success');
            loadGroupedDimensions();
            if (currentDetailGroup) refreshDetailView();
        } else {
            alert('删除失败: ' + result.message);
        }
    } catch (e) {
        alert('删除失败: ' + e.message);
    }
}

async function saveDimension() {
    var id = document.getElementById('dimension-id').value;
    var category = document.getElementById('dimension-category').value;
    var subCategory = document.getElementById('dimension-sub-category').value;

    var data = {
        name: document.getElementById('dimension-name').value,
        category: category,
        sub_category: subCategory,
        description: document.getElementById('dimension-description').value,
        examples: document.getElementById('dimension-examples').value,
        usage_tips: document.getElementById('dimension-usage-tips').value,
        applicable_audience: document.getElementById('dimension-applicable-audience').value
    };

    // 如果是市场洞察分类，添加市场洞察专用字段
    if (category === 'super_positioning' && subCategory === 'market_insight') {
        // 收集触发条件
        var triggerConditions = {};
        var businessTypes = Array.from(document.getElementById('trigger-business-types').selectedOptions).map(o => o.value);
        if (businessTypes.length > 0) {
            triggerConditions.business_types = businessTypes;
        }
        var searchStage = document.getElementById('trigger-search-stage').value;
        if (searchStage) {
            triggerConditions.search_stage = searchStage;
        }
        if (document.getElementById('trigger-has-baby').checked) triggerConditions.has_baby = true;
        if (document.getElementById('trigger-has-elderly').checked) triggerConditions.has_elderly = true;
        if (document.getElementById('trigger-has-enterprise').checked) triggerConditions.has_enterprise = true;
        if (document.getElementById('trigger-is-gift').checked) triggerConditions.is_gift = true;
        if (document.getElementById('trigger-is-pets').checked) triggerConditions.is_pets = true;

        data.trigger_conditions = triggerConditions;
        data.importance = parseInt(document.getElementById('dimension-importance').value) || 1;
        data.content_template = document.getElementById('dimension-content-template').value;
    }

    if (!data.name || !data.category) {
        alert('请填写必填项');
        return;
    }

    try {
        var url = id ? ('/admin/api/analysis-dimensions/' + id) : '/admin/api/analysis-dimensions';
        var method = id ? 'PUT' : 'POST';
        var response = await fetch(url, {
            method: method,
            headers: { 
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify(data)
        });
        var result = await response.json();
        if (result.success) {
            bootstrap.Modal.getInstance(document.getElementById('dimensionModal')).hide();
            // 如果当前在详情页，刷新详情页；否则重新加载列表
            if (currentDetailGroup) {
                loadGroupedDimensions(false).then(function() {
                    refreshDetailView();
                });
            } else {
                loadGroupedDimensions();
            }
            showToast('保存成功', 'success');
        } else {
            alert('保存失败: ' + result.message);
        }
    } catch (e) {
        alert('保存失败: ' + e.message);
    }
}

function showToast(message, type) {
    type = type === 'success' ? 'success' : (type === 'error' ? 'danger' : 'info');
    var toast = document.createElement('div');
    toast.className = 'toast align-items-center text-white bg-' + type + ' border-0';
    toast.setAttribute('role', 'alert');
    toast.innerHTML = '<div class="d-flex"><div class="toast-body">' + escapeHtml(message) + '</div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>';
    document.body.appendChild(toast);
    new bootstrap.Toast(toast).show();
    setTimeout(function() { toast.remove(); }, 3000);
}

// 初始化默认维度
function handleInitDimensions() {
    if (!confirm('确定要初始化默认维度吗？已存在的维度不会被重复创建。')) return;

    fetch('/admin/api/analysis-dimensions/init', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest'
        }
    })
        .then(res => {
            if (!res.ok) {
                throw new Error(`HTTP ${res.status}: ${res.statusText}`);
            }
            return res.json();
        })
        .then(data => {
            if (data.success) {
                alert(data.message);
                loadGroupedDimensions();
            } else {
                alert(data.message || '初始化失败');
            }
        })
        .catch(err => {
            console.error('初始化失败:', err);
            alert('初始化失败，请重试');
        });
}

// 拖拽排序功能
var draggedItem = null;

function initDragAndDrop() {
    var containers = document.querySelectorAll('.dimension-cards-container');
    var wrappers = document.querySelectorAll('.dimension-card-wrapper');

    wrappers.forEach(function(wrapper) {
        // 整个卡片可拖拽
        wrapper.addEventListener('dragstart', function(e) {
            draggedItem = wrapper;
            wrapper.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', wrapper.getAttribute('data-category') + '|' + wrapper.getAttribute('data-sub'));
            // 设置拖拽图像
            e.dataTransfer.setDragImage(wrapper, 20, 20);
        });

        wrapper.addEventListener('dragend', function(e) {
            wrapper.classList.remove('dragging');
            document.querySelectorAll('.dimension-card-wrapper').forEach(function(w) {
                w.classList.remove('drag-over');
            });
            draggedItem = null;
        });

        wrapper.addEventListener('dragover', function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        });

        wrapper.addEventListener('dragenter', function(e) {
            e.preventDefault();
            if (draggedItem && draggedItem !== wrapper) {
                wrapper.classList.add('drag-over');
            }
        });

        wrapper.addEventListener('dragleave', function(e) {
            // 只在真正离开时移除
            if (!wrapper.contains(e.relatedTarget)) {
                wrapper.classList.remove('drag-over');
            }
        });

        wrapper.addEventListener('drop', function(e) {
            e.preventDefault();
            e.stopPropagation();
            wrapper.classList.remove('drag-over');

            if (draggedItem && draggedItem !== wrapper) {
                var container = wrapper.parentNode;

                // 计算插入位置
                var allWrappers = Array.from(container.querySelectorAll('.dimension-card-wrapper:not(.dragging)'));
                var dropIndex = allWrappers.indexOf(wrapper);

                // 插入元素
                if (draggedItem.nextSibling === wrapper) {
                    // 如果拖拽元素正好在目标前面，不需要移动
                } else {
                    container.insertBefore(draggedItem, wrapper);
                }

                // 保存新排序到后端
                saveNewOrder(container);
            }
        });
    });
}

function saveNewOrder(container) {
    // container可能是col-wrapper，需要找到row容器
    var rowContainer = container.closest('.dimension-cards-container');
    if (!rowContainer) rowContainer = container;

    var wrappers = rowContainer.querySelectorAll('.dimension-card-wrapper');
    var orders = [];
    var category = rowContainer.getAttribute('data-category');

    wrappers.forEach(function(wrapper, index) {
        orders.push({
            category: category,
            sub_category: wrapper.getAttribute('data-sub') || '',
            sort_order: index
        });
    });

    fetch('/admin/api/analysis-dimensions/category-order', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-Requested-With': 'XMLHttpRequest'
        },
        body: JSON.stringify({ orders: orders })
    })
    .then(function(response) { return response.json(); })
    .then(function(result) {
        if (result.success) {
            showToast('排序已保存', 'success');
            // 更新本地缓存
            updateLocalCache(orders);
        } else {
            showToast('保存排序失败: ' + result.message, 'error');
            loadGroupedDimensions(); // 重新加载
        }
    })
    .catch(function(e) {
        showToast('保存排序失败: ' + e.message, 'error');
        loadGroupedDimensions();
    });
}

function updateLocalCache(orders) {
    // 按category分组更新缓存中的排序
    orders.forEach(function(item) {
        var group = groupedDataCache.find(function(g) {
            return g.category === item.category && g.sub_category === item.sub_category;
        });
        if (group) {
            group.sort_order = item.sort_order;
        }
    });

    // 重新加载数据以确保顺序正确
    loadGroupedDimensions();
}
</script>
