{% extends "base.html" %}

{% block title %}规则自动提取审核 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center page-header-animate">
                <div>
                    <h4 class="mb-1">规则自动提取审核</h4>
                    <p class="text-muted mb-0">审核 LLM 从生成内容中自动提取的规则建议</p>
                </div>
                <div class="btn-animate d-flex justify-content-end">
                    <a href="{{ url_for('admin.knowledge') }}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-arrow-left me-1"></i>返回
                    </a>
                    <a href="{{ url_for('admin.analysis_dimensions_page') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-gear me-1"></i>维度管理
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 状态筛选 -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="btn-group" role="group">
                <button type="button" class="btn btn-outline-secondary active" data-status="">全部</button>
                <button type="button" class="btn btn-outline-warning" data-status="pending">
                    <i class="bi bi-hourglass-split me-1"></i>待审核
                </button>
                <button type="button" class="btn btn-outline-success" data-status="approved">
                    <i class="bi bi-check-circle me-1"></i>已通过
                </button>
                <button type="button" class="btn btn-outline-danger" data-status="rejected">
                    <i class="bi bi-x-circle me-1"></i>已拒绝
                </button>
            </div>
        </div>
    </div>

    <!-- 规则提取列表 -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 60px;">ID</th>
                                    <th style="width: 180px;">源内容标题</th>
                                    <th style="width: 180px;">生成内容</th>
                                    <th style="width: 200px;">建议规则</th>
                                    <th style="width: 80px;">状态</th>
                                    <th style="width: 80px;">通过数</th>
                                    <th style="width: 150px;">创建时间</th>
                                    <th style="width: 150px;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="extractions-tbody">
                                <tr>
                                    <td colspan="8" class="text-center text-muted py-4">加载中...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分页 -->
    <div class="row mt-3">
        <div class="col-12 d-flex justify-content-center">
            <nav>
                <ul class="pagination" id="pagination"></ul>
            </nav>
        </div>
    </div>
</div>

<!-- 规则详情弹窗 -->
<div class="modal fade" id="extractionDetailModal" tabindex="-1" aria-labelledby="extractionDetailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="extractionDetailModalLabel">规则提取详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <h6 class="text-muted">源内容</h6>
                        <div class="card mb-3">
                            <div class="card-body">
                                <h6 id="detail-source-title"></h6>
                                <p id="detail-source-content" class="text-muted small" style="white-space: pre-wrap;"></p>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6 class="text-muted">生成内容</h6>
                        <div class="card mb-3">
                            <div class="card-body">
                                <h6 id="detail-generated-title"></h6>
                                <p id="detail-generated-content" class="text-muted small" style="white-space: pre-wrap;"></p>
                            </div>
                        </div>
                    </div>
                </div>
                <h6 class="text-muted mt-3">建议提取的规则</h6>
                <div id="detail-suggested-rules"></div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-danger" id="reject-extraction-btn">拒绝</button>
                <button type="button" class="btn btn-success" id="approve-extraction-btn">批准入库</button>
            </div>
        </div>
    </div>
</div>

<!-- 拒绝原因弹窗 -->
<div class="modal fade" id="rejectModal" tabindex="-1" aria-labelledby="rejectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="rejectModalLabel">拒绝原因</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">拒绝原因（可选）</label>
                    <textarea class="form-control" id="reject-notes" rows="3" placeholder="请输入拒绝原因..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="confirm-reject-btn">确认拒绝</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentStatus = '';
let currentPage = 1;
let currentExtractionId = null;

// 初始化
document.addEventListener('DOMContentLoaded', function() {
    loadExtractions();

    // 状态筛选
    document.querySelectorAll('[data-status]').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('[data-status]').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentStatus = this.dataset.status;
            currentPage = 1;
            loadExtractions();
        });
    });

    // 批准入库
    document.getElementById('approve-extraction-btn').addEventListener('click', function() {
        approveExtraction(currentExtractionId);
    });

    // 拒绝
    document.getElementById('reject-extraction-btn').addEventListener('click', function() {
        const rejectModal = new bootstrap.Modal(document.getElementById('rejectModal'));
        rejectModal.show();
    });

    // 确认拒绝
    document.getElementById('confirm-reject-btn').addEventListener('click', function() {
        const notes = document.getElementById('reject-notes').value;
        rejectExtraction(currentExtractionId, notes);
    });
});

// 加载规则提取列表
async function loadExtractions() {
    const tbody = document.getElementById('extractions-tbody');
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">加载中...</td></tr>';

    try {
        let url = `/admin/api/rule-extractions?page=${currentPage}&page_size=20`;
        if (currentStatus) {
            url += `&status=${currentStatus}`;
        }

        const response = await fetch(url);
        const result = await response.json();

        if (result.success) {
            renderExtractions(result.data);
            renderPagination(result.pages, result.page);
        } else {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">加载失败: ${result.message}</td></tr>`;
        }
    } catch (error) {
        tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">加载失败: ${error.message}</td></tr>`;
    }
}

// 渲染列表
function renderExtractions(extractions) {
    const tbody = document.getElementById('extractions-tbody');

    if (extractions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">暂无数据</td></tr>';
        return;
    }

    tbody.innerHTML = extractions.map(e => {
        const statusBadge = {
            'pending': '<span class="badge bg-transparent border border-warning text-dark">待审核</span>',
            'approved': '<span class="badge bg-transparent border border-success text-success">已通过</span>',
            'rejected': '<span class="badge bg-transparent border border-danger text-danger">已拒绝</span>'
        }[e.status] || e.status;

        const rulesCount = e.suggested_rules ? e.suggested_rules.length : 0;

        return `
            <tr>
                <td>${e.id}</td>
                <td>
                    <div class="text-truncate" style="max-width: 170px;" title="${e.source_title || ''}">
                        ${e.source_title || '-'}
                    </div>
                </td>
                <td>
                    <div class="text-truncate" style="max-width: 170px;" title="${e.generated_title || ''}">
                        ${e.generated_title || '-'}
                    </div>
                </td>
                <td>${rulesCount} 条规则</td>
                <td>${statusBadge}</td>
                <td>${e.approved_rules_count || 0}</td>
                <td>${formatDate(e.created_at)}</td>
                <td>
                    ${e.status === 'pending' ? `
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="viewExtraction(${e.id})">
                            <i class="bi bi-eye"></i> 审核
                        </button>
                    ` : `
                        <button class="btn btn-sm btn-outline-secondary" onclick="viewExtraction(${e.id})">
                            <i class="bi bi-eye"></i> 查看
                        </button>
                    `}
                </td>
            </tr>
        `;
    }).join('');
}

// 渲染分页
function renderPagination(totalPages, current) {
    const pagination = document.getElementById('pagination');
    if (totalPages <= 1) {
        pagination.innerHTML = '';
        return;
    }

    let html = '';
    html += `<li class="page-item ${current === 1 ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" onclick="goToPage(${current - 1})">上一页</a>
    </li>`;

    for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= current - 2 && i <= current + 2)) {
            html += `<li class="page-item ${i === current ? 'active' : ''}">
                <a class="page-link" href="javascript:void(0)" onclick="goToPage(${i})">${i}</a>
            </li>`;
        } else if (i === current - 3 || i === current + 3) {
            html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
        }
    }

    html += `<li class="page-item ${current === totalPages ? 'disabled' : ''}">
        <a class="page-link" href="javascript:void(0)" onclick="goToPage(${current + 1})">下一页</a>
    </li>`;

    pagination.innerHTML = html;
}

// 翻页
function goToPage(page) {
    currentPage = page;
    loadExtractions();
}

// 查看详情
async function viewExtraction(id) {
    currentExtractionId = id;

    try {
        const response = await fetch(`/admin/api/rule-extractions?id=${id}`);
        // 这里简化处理，直接使用列表数据
        const listResponse = await fetch(`/admin/api/rule-extractions?page_size=100`);
        const result = await listResponse.json();

        if (result.success) {
            const extraction = result.data.find(e => e.id === id);
            if (extraction) {
                showExtractionDetail(extraction);
            }
        }
    } catch (error) {
        alert('加载失败: ' + error.message);
    }
}

// 显示详情弹窗
function showExtractionDetail(extraction) {
    document.getElementById('detail-source-title').textContent = extraction.source_title || '无标题';
    document.getElementById('detail-source-content').textContent = extraction.source_content || '无内容';
    document.getElementById('detail-generated-title').textContent = extraction.generated_title || '无标题';
    document.getElementById('detail-generated-content').textContent = extraction.generated_content || '无内容';

    // 渲染建议规则
    const rulesContainer = document.getElementById('detail-suggested-rules');
    if (extraction.suggested_rules && extraction.suggested_rules.length > 0) {
        rulesContainer.innerHTML = extraction.suggested_rules.map((rule, index) => `
            <div class="card mb-2">
                <div class="card-body py-2">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <strong>规则 ${index + 1}: ${rule.rule_title || '未命名规则'}</strong>
                            <p class="mb-0 text-muted small">${rule.rule_content || ''}</p>
                            <div class="mt-1">
                                ${rule.category ? `<span class="badge me-1" style="background: transparent; border: 1px solid #adb5bd; color: #495057;">${rule.category}</span>` : ''}
                                ${rule.source_dimension ? `<span class="badge me-1" style="background: transparent; border: 1px solid #adb5bd; color: #495057;">${rule.source_dimension}</span>` : ''}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `).join('');
    } else {
        rulesContainer.innerHTML = '<p class="text-muted">暂无建议规则</p>';
    }

    // 根据状态显示/隐藏按钮
    const approveBtn = document.getElementById('approve-extraction-btn');
    const rejectBtn = document.getElementById('reject-extraction-btn');

    if (extraction.status === 'pending') {
        approveBtn.style.display = 'inline-block';
        rejectBtn.style.display = 'inline-block';
    } else {
        approveBtn.style.display = 'none';
        rejectBtn.style.display = 'none';
    }

    const modal = new bootstrap.Modal(document.getElementById('extractionDetailModal'));
    modal.show();
}

// 批准入库
async function approveExtraction(id) {
    if (!confirm('确认批准入库？将创建对应的规则记录。')) return;

    try {
        const response = await fetch(`/admin/api/rule-extractions/${id}/approve`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
        const result = await response.json();

        if (result.success) {
            bootstrap.Modal.getInstance(document.getElementById('extractionDetailModal')).hide();
            showToast(`成功创建 ${result.approved_count} 条规则`, 'success');
            loadExtractions();
        } else {
            alert('操作失败: ' + result.message);
        }
    } catch (error) {
        alert('操作失败: ' + error.message);
    }
}

// 拒绝
async function rejectExtraction(id, notes) {
    try {
        const response = await fetch(`/admin/api/rule-extractions/${id}/reject`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ notes: notes })
        });
        const result = await response.json();

        if (result.success) {
            bootstrap.Modal.getInstance(document.getElementById('rejectModal')).hide();
            bootstrap.Modal.getInstance(document.getElementById('extractionDetailModal')).hide();
            showToast('已拒绝', 'success');
            loadExtractions();
        } else {
            alert('操作失败: ' + result.message);
        }
    } catch (error) {
        alert('操作失败: ' + error.message);
    }
}

// 格式化日期
function formatDate(dateStr) {
    if (!dateStr) return '-';
    const date = new Date(dateStr);
    return date.toLocaleString('zh-CN');
}

// 显示提示
function showToast(message, type = 'info') {
    const toast = document.createElement('div');
    toast.className = `toast align-items-center text-white bg-${type === 'success' ? 'success' : type === 'error' ? 'danger' : 'info'} border-0`;
    toast.setAttribute('role', 'alert');
    toast.setAttribute('aria-live', 'assertive');
    toast.setAttribute('aria-atomic', 'true');
    toast.innerHTML = `
        <div class="d-flex">
            <div class="toast-body">${message}</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    `;
    document.body.appendChild(toast);
    const bsToast = new bootstrap.Toast(toast);
    bsToast.show();
    setTimeout(() => toast.remove(), 3000);
}
</script>
{% endblock %}
