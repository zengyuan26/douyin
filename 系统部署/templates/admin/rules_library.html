{% extends "base.html" %}

{% block title %}规则库 - AI棱镜{% endblock %}

{% block content %}
<style>
.sub-category-card { cursor: pointer; transition: border-color .15s, background-color .15s; }
.sub-category-card:hover { border-color: var(--bs-primary) !important; background-color: rgba(var(--bs-primary-rgb), 0.06) !important; }
</style>
<div class="container-fluid py-3">

    <!-- 页面标题 -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center page-header-animate">
                <div>
                    <h4 class="mb-1" style="font-weight: 600; color: var(--color-text-primary);">规则库</h4>
                    <p class="text-muted mb-0" style="font-size: 14px;">从爆款拆解入库的公式，供生成报告时学习参考</p>
                </div>
                <div class="d-flex justify-content-end">
                    <a href="{{ url_for('admin.knowledge') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>返回
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- 一级分类 Tab（账号分析、内容分析、方法论） -->
    <div class="row mb-3">
        <div class="col-12">
            <div class="section-card">
                <div class="section-body py-2">
                    <div class="d-flex align-items-center flex-wrap gap-2">
                        <span class="text-muted me-2">选择分析对象：</span>
                        <div id="category-tabs" class="btn-group flex-wrap" role="group">
                            {% for cat, cat_info in category_tabs.items() %}
                            <button type="button" class="btn btn-sm btn-outline-primary" data-category="{{ cat }}">
                                <i class="{{ cat_info.icon }} me-1"></i>{{ cat_info.name }}
                            </button>
                            {% endfor %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 二级分类卡片（sub_category，仅在选中一级分类时显示） -->
    <div class="row mb-3" id="sub-category-section" style="display: none;">
        <div class="col-12">
            <div class="section-card">
                <div class="section-body">
                    <div class="mb-3">
                        <span class="text-muted me-2 mb-2 d-inline-block">选择二级分类：</span>
                        <div id="sub-category-cards" class="row g-2">
                            <!-- 动态生成 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 规则列表（仅在选中二级分类时显示） -->
    <div class="row" id="rules-section" style="display: none;">
        <div class="col-12">
            <div class="section-card">
                <div class="section-body">
                    <div id="rules-container">
                        <div class="text-center text-muted py-4">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 未选一级分类时的占位 -->
    <div class="row" id="no-category-placeholder">
        <div class="col-12">
            <div class="section-card">
                <div class="section-body text-center text-muted py-5">
                    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                    请选择分析对象查看规则
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal fade" id="ruleViewModal" tabindex="-1" aria-labelledby="ruleViewModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="ruleViewModalLabel">公式详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <h6 id="view-rule-title" class="mb-3"></h6>
                <div class="mb-3">
                    <span class="badge bg-info" id="view-rule-dimension"></span>
                    <span class="badge bg-secondary ms-1" id="view-rule-object"></span>
                </div>
                <div id="view-rule-content" style="white-space: pre-wrap; line-height: 1.8;"></div>
                <hr>
                <div class="row">
                    <div class="col-md-4">
                        <small class="text-muted">适用场景：</small>
                        <div id="view-rule-scenarios"></div>
                    </div>
                    <div class="col-md-4">
                        <small class="text-muted">适用人群：</small>
                        <div id="view-rule-audiences"></div>
                    </div>
                    <div class="col-md-4">
                        <small class="text-muted">关键词：</small>
                        <div id="view-rule-keywords"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// 一级分类 -> 二级分类映射（从后端传入）
const CATEGORY_TABS = {{ category_tabs | tojson | safe }};
const CATEGORY_MAP = {{ category_map | tojson | safe }};

let currentCategory = '';
let currentSubCategory = '';

document.addEventListener('DOMContentLoaded', function() {
    updateNoCategoryPlaceholder();
    initEventListeners();
});

function initEventListeners() {
    // 一级 Tab 点击
    document.querySelectorAll('#category-tabs .btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('#category-tabs .btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentCategory = this.dataset.category || '';
            currentSubCategory = '';
            updateSubCategoryCards();
            updateNoCategoryPlaceholder();
        });
    });

    // 二级分类卡片点击（事件委托）
    document.getElementById('sub-category-cards').addEventListener('click', function(e) {
        const card = e.target.closest('.sub-category-card');
        if (!card) return;
        currentSubCategory = card.dataset.subCategory || '';
        // 更新选中状态
        document.querySelectorAll('.sub-category-card').forEach(c => {
            c.classList.remove('border-primary', 'bg-primary', 'bg-opacity-10');
            c.classList.add('border');
        });
        card.classList.remove('border');
        card.classList.add('border-primary', 'bg-primary', 'bg-opacity-10');
        // 直接显示规则列表
        document.getElementById('rules-section').style.display = '';
        loadRules();
    });
}

function updateNoCategoryPlaceholder() {
    const subCatSection = document.getElementById('sub-category-section');
    const rulesSection = document.getElementById('rules-section');
    const placeholder = document.getElementById('no-category-placeholder');
    if (currentCategory && CATEGORY_MAP[currentCategory]) {
        placeholder.classList.add('d-none');
        subCatSection.style.display = '';
        rulesSection.style.display = 'none';
    } else {
        placeholder.classList.remove('d-none');
        subCatSection.style.display = 'none';
        rulesSection.style.display = 'none';
    }
}

function updateSubCategoryCards() {
    const container = document.getElementById('sub-category-cards');
    if (!currentCategory || !CATEGORY_MAP[currentCategory]) {
        container.innerHTML = '';
        return;
    }
    const subCats = CATEGORY_MAP[currentCategory];
    const subCatList = Object.entries(subCats).map(([code, info]) => ({
        code,
        name: info.name,
        ruleCount: info.ruleCount || 0
    }));
    container.innerHTML = subCatList.map(sc => `
        <div class="col-6 col-md-4 col-lg-3 col-xl-2">
            <div class="card sub-category-card h-100 border cursor-pointer" data-sub-category="${sc.code}" role="button">
                <div class="card-body py-3 text-center">
                    <span class="d-block fw-medium">${sc.name}</span>
                    <small class="text-muted">${sc.ruleCount} 条公式</small>
                </div>
            </div>
        </div>
    `).join('');
}

async function loadRules() {
    const container = document.getElementById('rules-container');
    container.innerHTML = '<div class="text-center text-muted py-4">加载中...</div>';

    try {
        let url = `/admin/api/rules?`;
        if (currentCategory) {
            url += `category=${encodeURIComponent(currentCategory)}&`;
        }
        if (currentSubCategory) {
            url += `sub_category=${encodeURIComponent(currentSubCategory)}`;
        }
        // 移除末尾的 & 或 ?
        url = url.replace(/[?&]$/, '');
        if (!url.includes('=')) {
            url = '/admin/api/rules';
        }

        const response = await fetch(url);
        const result = await response.json();

        if (result.success) {
            renderRules(result.data);
        } else {
            container.innerHTML = `<div class="text-center text-danger py-4">加载失败</div>`;
        }
    } catch (error) {
        container.innerHTML = `<div class="text-center text-danger py-4">加载失败: ${error.message}</div>`;
    }
}

function renderRules(items) {
    const container = document.getElementById('rules-container');
    
    if (!items || items.length === 0) {
        container.innerHTML = `
            <div class="text-center text-muted py-5">
                <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                暂无规则数据
            </div>
        `;
        return;
    }

    container.innerHTML = `
        <ul class="list-group list-group-flush">
            ${items.map(item => `
                <li class="list-group-item list-group-item-action d-flex justify-content-between align-items-start py-3" onclick="viewRule(${item.id})" style="cursor: pointer;">
                    <div class="ms-2 me-auto flex-grow-1">
                        <div class="fw-medium mb-1">${item.title || '未命名公式'}</div>
                        <div class="text-muted small" style="line-height: 1.5;">
                            ${(item.content || '').substring(0, 120)}${(item.content || '').length > 120 ? '...' : ''}
                        </div>
                    </div>
                    <div class="d-flex flex-shrink-0 gap-1 ms-2">
                        <span class="badge bg-primary">${item.category_name || ''}</span>
                        <span class="badge bg-light text-dark">${item.object_name || ''}</span>
                    </div>
                </li>
            `).join('')}
        </ul>
    `;
}

async function viewRule(id) {
    try {
        const response = await fetch(`/admin/api/rules/${id}`);
        const result = await response.json();
        
        if (result.success) {
            const rule = result.data;
            document.getElementById('view-rule-title').textContent = rule.title || '(无标题)';
            document.getElementById('view-rule-dimension').textContent = rule.dimension_name || '';
            document.getElementById('view-rule-object').textContent = rule.object_name || '';
            document.getElementById('view-rule-content').textContent = rule.content || '';

            const toBadges = arr => arr && arr.length > 0 
                ? arr.map(s => `<span class="badge bg-light text-dark me-1 mb-1">${s}</span>`).join('') 
                : '-';
            document.getElementById('view-rule-scenarios').innerHTML = toBadges(rule.applicable_scenarios);
            document.getElementById('view-rule-audiences').innerHTML = toBadges(rule.applicable_audiences);
            document.getElementById('view-rule-keywords').innerHTML = toBadges(rule.keywords);

            new bootstrap.Modal(document.getElementById('ruleViewModal')).show();
        }
    } catch (error) {
        alert('加载失败');
    }
}
</script>
{% endblock %}
