{% extends "base.html" %}

{% block title %}电子书分析 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center page-header-animate">
                <div>
                    <h4 class="mb-1">电子书分析</h4>
                    <p class="text-muted mb-0">上传电子书，AI 智能分析并提取可入库的规则</p>
                </div>
                <div class="btn-animate">
                    <a href="{{ url_for('admin.knowledge') }}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>返回规则库
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <!-- 左侧：文件上传区 -->
        <div class="col-lg-5 mb-4">
            <!-- 文件上传区域 -->
            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0"><i class="bi bi-upload me-2"></i>上传电子书</h5>
                </div>
                <div class="card-body">
                    <label for="fileInput" id="dropZone" class="d-block border border-2 border-dashed rounded-3 p-4 text-center" style="border-color: #6c757d; cursor: pointer; transition: all 0.3s;">
                        <i class="bi bi-file-earmark-arrow-up fs-1 text-muted"></i>
                        <p class="mb-1 mt-2">拖拽文件到这里，或点击上传</p>
                        <p class="text-muted small mb-0">支持 PDF、EPUB 格式</p>
                    </label>
                    <input type="file" id="fileInput" accept=".pdf,.epub" multiple style="display: none;">
                </div>
            </div>

            <!-- 文件列表 -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3 d-flex justify-content-between align-items-center">
                    <h5 class="mb-0"><i class="bi bi-files me-2"></i>已上传文件</h5>
                    <button id="analyzeBtn" class="btn btn-success btn-sm" disabled>
                        <i class="bi bi-stars me-1"></i>开始分析
                    </button>
                </div>
                <div class="card-body p-0">
                    <div id="fileList" class="list-group list-group-flush">
                        <div class="text-center py-4 text-muted" id="emptyFileList">
                            <i class="bi bi-inbox fs-1"></i>
                            <p class="mb-0 mt-2">暂无上传的电子书</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：分析结果 -->
        <div class="col-lg-7 mb-4">
            <div class="card border-0 shadow-sm" style="min-height: 600px; max-height: calc(100vh - 180px); display: flex; flex-direction: column;">
                <div class="card-header bg-white border-0 py-3 flex-shrink-0">
                    <h5 class="mb-0"><i class="bi bi-clipboard-data me-2"></i>分析结果</h5>
                </div>
                <div class="card-body" style="flex: 1 1 auto; overflow-y: auto; padding-bottom: 80px;">
                    <div id="resultPlaceholder" class="text-center py-5 text-muted">
                        <i class="bi bi-file-earmark-text fs-1"></i>
                        <p class="mt-2">上传电子书并点击分析后，查看结果</p>
                    </div>
                    <div id="resultContent" style="display: none;">
                        <!-- 分析进度 -->
                        <div id="analyzeProgress" class="mb-4" style="display: none;">
                            <div class="d-flex align-items-center mb-2">
                                <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                <span>正在分析中...</span>
                            </div>
                            <div class="progress" style="height: 6px;">
                                <div id="progressBar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
                            </div>
                            <p class="text-muted small mt-1 mb-0" id="progressText">正在提取文本内容...</p>
                        </div>

                        <!-- 分析结果展示 -->
                        <div id="analysisResult" style="display: none;">
                            <div class="alert alert-info mb-3">
                                <i class="bi bi-info-circle me-1"></i>
                                <strong>分析完成</strong> - 共提取 <span id="ruleCount">0</span> 条可入库规则
                            </div>

                            <!-- 规则列表 -->
                            <div id="rulesContainer" style="max-height: 350px; overflow-y: auto;"></div>

                            <!-- 入库按钮 -->
                            <div class="mt-4 pt-3 border-top fixed-bottom-bar">
                                <button id="importRulesBtn" class="btn btn-primary" disabled>
                                    <i class="bi bi-check-circle me-1"></i>导入选中的规则
                                </button>
                                <span class="text-muted ms-2" id="selectedCount">0 条规则已选择</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
// 状态管理
let uploadedFiles = [];
let analysisResult = null;

// DOM 元素
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const emptyFileList = document.getElementById('emptyFileList');
const analyzeBtn = document.getElementById('analyzeBtn');
const resultPlaceholder = document.getElementById('resultPlaceholder');
const resultContent = document.getElementById('resultContent');
const analyzeProgress = document.getElementById('analyzeProgress');
const progressBar = document.getElementById('progressBar');
const progressText = document.getElementById('progressText');
const analysisResultDiv = document.getElementById('analysisResult');
const rulesContainer = document.getElementById('rulesContainer');
const importRulesBtn = document.getElementById('importRulesBtn');
const selectedCount = document.getElementById('selectedCount');
const ruleCount = document.getElementById('ruleCount');

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.style.borderColor = '#0d6efd';
    dropZone.style.backgroundColor = '#f8f9fa';
});

dropZone.addEventListener('dragleave', () => {
    dropZone.style.borderColor = '#6c757d';
    dropZone.style.backgroundColor = '';
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.style.borderColor = '#6c757d';
    dropZone.style.backgroundColor = '';
    handleFiles(e.dataTransfer.files);
});

// 文件选择事件监听
fileInput.addEventListener('change', (e) => {
    console.log('File input changed', e.target.files);
    if (e.target.files && e.target.files.length > 0) {
        // 将 FileList 转换为数组，避免清空 input 后文件丢失
        const filesArray = Array.from(e.target.files);
        console.log('Files array:', filesArray);
        handleFiles(filesArray);
        // 清空文件输入框，允许重复选择相同文件
        e.target.value = '';
    }
});

async function handleFiles(files) {
    console.log('handleFiles called', files);
    for (const file of files) {
        const ext = file.name.split('.').pop().toLowerCase();
        if (!['pdf', 'epub'].includes(ext)) {
            alert(`不支持的文件格式: ${file.name}，仅支持 PDF 和 EPUB`);
            continue;
        }

        // 添加到列表
        const fileData = {
            id: Date.now() + Math.random(),
            name: file.name,
            size: file.size,
            type: ext,
            file: file
        };
        uploadedFiles.push(fileData);
        console.log('File added:', fileData);
        renderFileList();
    }
    updateAnalyzeBtn();
}

function renderFileList() {
    console.log('renderFileList called, uploadedFiles length:', uploadedFiles.length);
    if (uploadedFiles.length === 0) {
        emptyFileList.style.display = 'block';
        fileList.querySelectorAll('.file-item').forEach(el => el.remove());
        return;
    }

    emptyFileList.style.display = 'none';

    // 移除旧项
    fileList.querySelectorAll('.file-item').forEach(el => el.remove());

    uploadedFiles.forEach(file => {
        const item = document.createElement('div');
        item.className = 'list-group-item file-item d-flex justify-content-between align-items-center';
        item.innerHTML = `
            <div class="d-flex align-items-center">
                <i class="bi bi-file-earmark-${file.type === 'pdf' ? 'pdf' : 'book'} text-${file.type === 'pdf' ? 'danger' : 'primary'} me-2 fs-5"></i>
                <div>
                    <div class="fw-medium">${file.name}</div>
                    <small class="text-muted">${formatSize(file.size)}</small>
                </div>
            </div>
            <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${file.id}">
                <i class="bi bi-x-lg"></i>
            </button>
        `;
        fileList.appendChild(item);
    });

    // 删除事件
    document.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const id = parseFloat(e.target.closest('.delete-btn').dataset.id);
            uploadedFiles = uploadedFiles.filter(f => f.id !== id);
            renderFileList();
            updateAnalyzeBtn();
        });
    });
}

function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function updateAnalyzeBtn() {
    analyzeBtn.disabled = uploadedFiles.length === 0;
}

// 开始分析
analyzeBtn.addEventListener('click', async () => {
    if (uploadedFiles.length === 0) return;

    // 显示进度
    resultPlaceholder.style.display = 'none';
    resultContent.style.display = 'block';
    analyzeProgress.style.display = 'block';
    analysisResultDiv.style.display = 'none';
    progressBar.style.width = '0%';
    progressText.textContent = '正在提取文本内容...';

    // 逐个上传文件
    const formData = new FormData();
    uploadedFiles.forEach(file => {
        formData.append('files', file.file);
    });

    try {
        progressBar.style.width = '30%';
        progressText.textContent = '正在上传文件...';

        const uploadRes = await fetch('/api/knowledge/ebook/upload', {
            method: 'POST',
            body: formData
        });

        if (!uploadRes.ok) throw new Error('文件上传失败');

        const uploadData = await uploadRes.json();
        if (!uploadData || uploadData.code !== 200 || !uploadData.data || !uploadData.data.files) {
            throw new Error(uploadData && uploadData.message ? uploadData.message : '文件上传失败');
        }

        const fileIds = uploadData.data.files.map(f => f.id);

        progressBar.style.width = '50%';
        progressText.textContent = '正在调用 AI 分析...';

        // 调用分析接口
        const analyzeRes = await fetch('/api/knowledge/ebook/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ file_ids: fileIds })
        });

        if (!analyzeRes.ok) throw new Error('分析失败');

        const analyzeData = await analyzeRes.json();
        if (!analyzeData || analyzeData.code !== 200 || !analyzeData.data) {
            throw new Error(analyzeData && analyzeData.message ? analyzeData.message : '分析失败');
        }

        progressBar.style.width = '100%';
        progressText.textContent = '分析完成！';

        // 显示结果
        setTimeout(() => {
            analyzeProgress.style.display = 'none';
            displayAnalysisResult(analyzeData.data);
        }, 500);

    } catch (error) {
        alert('分析失败: ' + error.message);
        analyzeProgress.style.display = 'none';
        resultPlaceholder.style.display = 'block';
    }
});

function displayAnalysisResult(data) {
    console.log('displayAnalysisResult called with data:', data);
    analysisResult = data;
    analysisResultDiv.style.display = 'block';
    ruleCount.textContent = data.rules.length;

    if (!data.rules || data.rules.length === 0) {
        alert('未从电子书中提取到规则');
        return;
    }

    // 渲染规则列表
    rulesContainer.innerHTML = '';
    const categories = {};

    data.rules.forEach((rule, index) => {
        if (!categories[rule.category]) {
            categories[rule.category] = [];
        }
        categories[rule.category].push({ ...rule, index });
    });

    for (const [category, rules] of Object.entries(categories)) {
        const categoryDiv = document.createElement('div');
        categoryDiv.className = 'mb-4';

        const categoryTitle = {
            'keywords': '关键词库',
            'topic': '选题库',
            'template': '内容模板',
            'operation': '运营规划',
            'market': '市场分析'
        }[category] || category;

        categoryDiv.innerHTML = `
            <h6 class="border-bottom pb-2 mb-3">
                <i class="bi bi-folder-${category === 'keywords' ? '' : '2'} me-1"></i>${categoryTitle}
            </h6>
        `;

        rules.forEach(rule => {
            const ruleCard = document.createElement('div');
            ruleCard.className = 'card mb-2 border';

            // 根据规则标题判断具体类型（使用无底色的小标签）
            let ruleType = '';
            const title = rule.title || '';
            const desc = rule.description || '';

            if (title.includes('起名') || title.includes('名字') || title.includes('昵称')) {
                ruleType = '<span class="text-muted small ms-2">[账号起名]</span>';
            } else if (title.includes('简介') || title.includes('bio') || title.includes('Bio')) {
                ruleType = '<span class="text-muted small ms-2">[账号简介]</span>';
            } else if (title.includes('头像') || title.includes('头像')) {
                ruleType = '<span class="text-muted small ms-2">[头像设计]</span>';
            } else if (title.includes('主页') || title.includes('装修') || title.includes('背景图')) {
                ruleType = '<span class="text-muted small ms-2">[主页装修]</span>';
            } else if (title.includes('发布') || title.includes('时机') || title.includes('时间')) {
                ruleType = '<span class="text-muted small ms-2">[发布时机]</span>';
            } else if (title.includes('互动') || title.includes('回复') || title.includes('评论')) {
                ruleType = '<span class="text-muted small ms-2">[互动策略]</span>';
            } else if (title.includes('粉丝') || title.includes('粘性')) {
                ruleType = '<span class="text-muted small ms-2">[粉丝运营]</span>';
            } else if (title.includes('复盘') || title.includes('数据') || title.includes('分析')) {
                ruleType = '<span class="text-muted small ms-2">[数据复盘]</span>';
            } else if (title.includes('用户') || title.includes('画像') || title.includes('受众')) {
                ruleType = '<span class="text-muted small ms-2">[用户画像]</span>';
            } else if (title.includes('竞品') || title.includes('竞争') || title.includes('对手')) {
                ruleType = '<span class="text-muted small ms-2">[竞品分析]</span>';
            } else if (title.includes('趋势') || title.includes('市场') || title.includes('行业')) {
                ruleType = '<span class="text-muted small ms-2">[市场分析]</span>';
            } else if (title.includes('痛点') || title.includes('需求')) {
                ruleType = '<span class="text-muted small ms-2">[用户痛点]</span>';
            } else if (title.includes('变现') || title.includes('商业模式') || title.includes('盈利')) {
                ruleType = '<span class="text-muted small ms-2">[变现模式]</span>';
            }

            ruleCard.innerHTML = `
                <div class="card-body py-2">
                    <div class="form-check">
                        <input class="form-check-input rule-checkbox" type="checkbox" value="${rule.index}" id="rule-${rule.index}" checked>
                        <label class="form-check-label w-100" for="rule-${rule.index}">
                            <div class="fw-medium">${rule.title}${ruleType}</div>
                            <small class="text-muted">${rule.summary || rule.description?.substring(0, 100) || ''}</small>
                        </label>
                    </div>
                </div>
            `;
            categoryDiv.appendChild(ruleCard);
        });

        rulesContainer.appendChild(categoryDiv);
    }

    // 监听选择变化
    document.querySelectorAll('.rule-checkbox').forEach(checkbox => {
        checkbox.addEventListener('change', updateSelectedCount);
    });

    updateSelectedCount();
}

function updateSelectedCount() {
    const checked = document.querySelectorAll('.rule-checkbox:checked').length;
    selectedCount.textContent = `${checked} 条规则已选择`;
    importRulesBtn.disabled = checked === 0;
}

// 导入规则
importRulesBtn.addEventListener('click', async () => {
    const selectedRules = [];
    document.querySelectorAll('.rule-checkbox:checked').forEach(checkbox => {
        const index = parseInt(checkbox.value);
        selectedRules.push(analysisResult.rules[index]);
    });

    try {
        importRulesBtn.disabled = true;
        importRulesBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>导入中...';

        const res = await fetch('/api/knowledge/ebook/rules/import', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rules: selectedRules })
        });

        if (!res.ok) throw new Error('导入失败');

        const data = await res.json();
        if (!data || data.code !== 200 || !data.data) {
            throw new Error(data && data.message ? data.message : '导入失败');
        }

        alert(`成功导入 ${data.data.imported_count} 条规则！`);

        // 跳转到规则库
        window.location.href = '/admin/knowledge';
    } catch (error) {
        alert('导入失败: ' + error.message);
        importRulesBtn.disabled = false;
        importRulesBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i>导入选中的规则';
    }
});
</script>

<style>
.fixed-bottom-bar {
    position: sticky;
    bottom: 0;
    background: white;
    padding: 12px 0;
    border-top: 1px solid #eee;
    margin-top: 12px;
    z-index: 10;
}
</style>
{% endblock %}
