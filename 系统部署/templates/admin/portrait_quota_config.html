{% extends "base.html" %}

{% block title %}画像配额配置 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">

    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-1" style="font-weight: 600; color: var(--color-text-primary);">画像配额配置</h4>
                    <p class="text-muted mb-0">配置各方案用户可保存的画像数量上限</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 配置表格 -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 150px;">方案</th>
                                <th style="width: 120px;">可保存数量</th>
                                <th>说明</th>
                                <th style="width: 120px;">操作</th>
                            </tr>
                        </thead>
                        <tbody id="quota-table">
                            <tr>
                                <td colspan="4" class="text-center text-muted py-4">
                                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                    加载中...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div class="row mt-4">
        <div class="col-12">
            <div class="alert alert-info">
                <i class="bi bi-info-circle me-2"></i>
                <strong>说明：</strong>
                <ul class="mb-0 mt-2">
                    <li>设置为 <code>0</code> 表示该方案用户不可保存画像</li>
                    <li>每个用户保存新画像时会自动覆盖旧的（只保留最新一个）</li>
                    <li>修改后立即生效，无需重启服务</li>
                </ul>
            </div>
        </div>
    </div>
</div>

<script>
// 方案显示名称
const planNames = {
    'free': '免费体验',
    'basic': '基础版',
    'professional': '专业版',
    'enterprise': '企业版'
};

// 加载配置
async function loadQuotas() {
    try {
        const resp = await fetch('/admin/portrait-quota/config', {
            credentials: 'include'
        });
        const data = await resp.json();
        
        if (data.success && data.data) {
            renderTable(data.data);
        } else {
            showError('加载配置失败');
        }
    } catch (e) {
        showError('加载失败: ' + e.message);
    }
}

// 渲染表格
function renderTable(quotas) {
    const tbody = document.getElementById('quota-table');
    const plans = ['free', 'basic', 'professional', 'enterprise'];
    
    tbody.innerHTML = plans.map(plan => {
        const config = quotas[plan] || { max_saved: 0, description: '' };
        return `
            <tr>
                <td>
                    <span class="badge ${getPlanBadgeClass(plan)}">${planNames[plan] || plan}</span>
                </td>
                <td>
                    <div class="d-flex align-items-center gap-2">
                        <input type="number" class="form-control form-control-sm" 
                               id="quota-${plan}" value="${config.max_saved}" min="0" max="999"
                               style="width: 80px;">
                    </div>
                </td>
                <td class="text-muted small">
                    ${config.description || '未设置'}
                </td>
                <td>
                    <button class="btn btn-primary btn-sm" onclick="updateQuota('${plan}')">
                        <i class="bi bi-check-lg me-1"></i>保存
                    </button>
                </td>
            </tr>
        `;
    }).join('');
}

// 获取方案徽章样式
function getPlanBadgeClass(plan) {
    const classes = {
        'free': 'bg-secondary',
        'basic': 'bg-primary',
        'professional': 'bg-success',
        'enterprise': 'bg-danger'
    };
    return classes[plan] || 'bg-secondary';
}

// 更新配额
async function updateQuota(plan) {
    const input = document.getElementById(`quota-${plan}`);
    const value = parseInt(input.value);
    
    if (isNaN(value) || value < 0) {
        alert('请输入有效的数字（大于等于0）');
        return;
    }
    
    try {
        const resp = await fetch('/admin/portrait-quota/config', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                plan: plan,
                max_saved: value
            })
        });
        const data = await resp.json();
        
        if (data.success) {
            showToast(`方案「${planNames[plan]}」配置已更新`);
        } else {
            alert(data.message || '更新失败');
        }
    } catch (e) {
        alert('更新失败: ' + e.message);
    }
}

// 显示错误
function showError(msg) {
    const tbody = document.getElementById('quota-table');
    tbody.innerHTML = `
        <tr>
            <td colspan="4" class="text-center text-danger py-4">
                ${msg}
            </td>
        </tr>
    `;
}

// 显示提示
function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast-container position-fixed bottom-0 end-0 p-3';
    toast.innerHTML = `
        <div class="toast show align-items-center text-white bg-success border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">${msg}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    `;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// 页面加载时获取配置
document.addEventListener('DOMContentLoaded', loadQuotas);
</script>
{% endblock %}
