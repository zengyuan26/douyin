{% extends "base.html" %}

{% block title %}知识库管理 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <!-- 页面标题 -->
    <div class="row mb-4">
        <div class="col-12">
            <div class="page-header-animate">
                <h4 class="mb-1">知识库管理</h4>
                <p class="text-muted mb-0">管理和查看已入库的知识内容</p>
            </div>
        </div>
    </div>

    <!-- 四个大快捷入口 -->
    <div class="row g-4 mb-4">
        <!-- 规则库 -->
        <div class="col-md-3">
            <a href="{{ url_for('admin.knowledge_rules') }}" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 knowledge-card" style="cursor: pointer; transition: all 0.3s ease;">
                    <div class="card-body text-center py-5">
                        <div class="knowledge-icon mb-3">
                            <i class="bi bi-bookmark-star" style="font-size: 3rem; color: #007AFF;"></i>
                        </div>
                        <h5 class="card-title mb-2">规则库</h5>
                        <p class="card-text text-muted small mb-0">关键词库、选题库、内容模板、运营规划等规则模板</p>
                    </div>
                </div>
            </a>
        </div>

        <!-- 账号分析 -->
        <div class="col-md-3">
            <a href="{{ url_for('admin.knowledge_account_analysis') }}" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 knowledge-card" style="cursor: pointer; transition: all 0.3s ease;">
                    <div class="card-body text-center py-5">
                        <div class="knowledge-icon mb-3">
                            <i class="bi bi-person-badge" style="font-size: 3rem; color: #34C759;"></i>
                        </div>
                        <h5 class="card-title mb-2">账号分析</h5>
                        <p class="card-text text-muted small mb-0">账号定位、内容策略、竞品分析、运营数据等</p>
                    </div>
                </div>
            </a>
        </div>

        <!-- 电子书分析 -->
        <div class="col-md-3">
            <a href="{{ url_for('admin.knowledge_ebook') }}" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 knowledge-card" style="cursor: pointer; transition: all 0.3s ease;">
                    <div class="card-body text-center py-5">
                        <div class="knowledge-icon mb-3">
                            <i class="bi bi-book" style="font-size: 3rem; color: #FF9500;"></i>
                        </div>
                        <h5 class="card-title mb-2">电子书分析</h5>
                        <p class="card-text text-muted small mb-0">电子书内容提取、分析、知识点整理</p>
                    </div>
                </div>
            </a>
        </div>

        <!-- 内容分析 -->
        <div class="col-md-3">
            <a href="{{ url_for('admin.knowledge_analyze') }}" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 knowledge-card" style="cursor: pointer; transition: all 0.3s ease;">
                    <div class="card-body text-center py-5">
                        <div class="knowledge-icon mb-3">
                            <i class="bi bi-camera-video" style="font-size: 3rem; color: #AF52DE;"></i>
                        </div>
                        <h5 class="card-title mb-2">内容分析</h5>
                        <p class="card-text text-muted small mb-0">短视频、图文内容分析、脚本创作、封面设计</p>
                    </div>
                </div>
            </a>
        </div>
    </div>

    <!-- 每日提醒 -->
    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm" id="dailyQuoteCard" style="background-size: cover; background-position: center; position: relative;">
                <div class="position-absolute top-0 start-0 w-100 h-100" id="quoteOverlay" style="background: rgba(0,0,0,0.65);"></div>
                <div class="card-body py-4 position-relative" style="z-index: 1;">
                    <div class="d-flex align-items-center">
                        <div class="me-3">
                            <i class="bi bi-lightbulb text-white" style="font-size: 2rem;"></i>
                        </div>
                        <div class="text-white">
                            <h6 class="mb-1 fw-bold">每日提醒</h6>
                            <p class="mb-0 fs-5" style="font-style: italic;" id="dailyQuote">加载中...</p>
                            <small class="opacity-75" id="quoteSource">—— 正在获取今日台词</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
async function loadDailyQuote() {
    try {
        const response = await fetch('/api/knowledge/daily-quote');
        const data = await response.json();
        
        if (data.code === 200 && data.data) {
            const quote = data.data;
            
            // 设置背景海报
            if (quote.poster_url) {
                document.getElementById('dailyQuoteCard').style.backgroundImage = `url(${quote.poster_url})`;
            }
            
            // 设置台词
            const quoteText = quote.quote_cn || quote.quote;
            document.getElementById('dailyQuote').textContent = `"${quoteText}"`;
            
            // 设置来源
            let sourceText = `—— ${quote.author || ''}`;
            if (quote.source) {
                sourceText += quote.source;
            }
            if (quote.movie) {
                sourceText += ` | 电影《${quote.movie}》`;
            }
            document.getElementById('quoteSource').textContent = sourceText;
        }
    } catch (error) {
        console.error('加载每日台词失败:', error);
        document.getElementById('dailyQuote').textContent = '"Do not go gentle into that good night."';
        document.getElementById('quoteSource').textContent = '—— 迪伦·托马斯 | 电影《星际穿越》';
    }
}

// 页面加载时获取每日台词
loadDailyQuote();
</script>

<style>
.knowledge-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.1) !important;
}
.knowledge-icon {
    line-height: 1;
}
</style>
{% endblock %}
