{% extends "base.html" %}

{% block title %}{% if article %}编辑{% else %}添加{% endif %}文章 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-10">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0">{% if article %}编辑{% else %}添加{% endif %}文章</h5>
                </div>
                <div class="card-body">
                    <form method="POST" id="articleForm">
                        <div class="row g-3">
                            <!-- 基本信息 -->
                            <div class="col-12">
                                <h6 class="text-muted border-bottom pb-2 mb-3">基本信息</h6>
                            </div>
                            
                            <div class="col-md-8">
                                <label class="form-label">标题 <span class="text-danger">*</span></label>
                                <input type="text" name="title" class="form-control" value="{{ article.title if article else '' }}" required>
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label">Slug</label>
                                <input type="text" name="slug" class="form-control" value="{{ article.slug if article else '' }}" placeholder="auto-generate-if-empty">
                                <small class="text-muted">用于URL的唯一标识，留空则自动生成</small>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label">分类 <span class="text-danger">*</span></label>
                                <select name="category_id" class="form-select" required>
                                    <option value="">请选择分类</option>
                                    {% for category in categories %}
                                    <option value="{{ category.id }}" {% if article and article.category_id == category.id %}selected{% endif %}>
                                        {{ category.name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>
                            
                            <div class="col-md-3">
                                <label class="form-label">内容类型</label>
                                <select name="content_type" class="form-select">
                                    <option value="pure_text" {% if article and article.content_type == 'pure_text' %}selected{% endif %}>纯文字</option>
                                    <option value="graphic" {% if article and article.content_type == 'graphic' %}selected{% endif %}>图文</option>
                                    <option value="video" {% if article and article.content_type == 'video' %}selected{% endif %}>短视频</option>
                                </select>
                            </div>
                            
                            <div class="col-md-3">
                                <label class="form-label">状态</label>
                                <div class="mt-2">
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="is_published" id="statusDraft" value="0" {% if article and not article.is_published %}checked{% elif not article %}checked{% endif %}>
                                        <label class="form-check-label" for="statusDraft">草稿</label>
                                    </div>
                                    <div class="form-check form-check-inline">
                                        <input class="form-check-input" type="radio" name="is_published" id="statusPublished" value="1" {% if article and article.is_published %}checked{% endif %}>
                                        <label class="form-check-label" for="statusPublished">已发布</label>
                                    </div>
                                </div>
                            </div>
                            
                            <!-- 元信息 -->
                            <div class="col-12 mt-4">
                                <h6 class="text-muted border-bottom pb-2 mb-3">元信息</h6>
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label">作者</label>
                                <input type="text" name="author" class="form-control" value="{{ article.author if article else '' }}">
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label">来源</label>
                                <input type="text" name="source" class="form-control" value="{{ article.source if article else '' }}" placeholder="原创/转载/采集">
                            </div>
                            
                            <div class="col-md-4">
                                <label class="form-label">标签</label>
                                <input type="text" name="tags" class="form-control" value="{{ article.tags|join(',') if article and article.tags else '' }}" placeholder="用逗号分隔，如：干货,教程">
                                <small class="text-muted">多个标签用逗号分隔</small>
                            </div>
                            
                            <!-- 文章内容 -->
                            <div class="col-12 mt-4">
                                <h6 class="text-muted border-bottom pb-2 mb-3">文章内容</h6>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label">内容</label>
                                <textarea name="content" class="form-control" rows="20" id="contentEditor">{{ article.content if article else '' }}</textarea>
                                <small class="text-muted">支持 Markdown 语法</small>
                            </div>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{{ url_for('admin.knowledge_articles') }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>保存
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
/* Markdown 编辑器样式 */
#contentEditor {
    font-family: 'SF Mono', Monaco, 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
    resize: vertical;
}

/* 表单标签样式优化 */
.form-label {
    font-weight: 500;
    color: #495057;
}

/* 单选按钮组样式 */
.form-check-inline {
    margin-right: 1rem;
}

/* 卡片内标题样式 */
h6 {
    font-weight: 600;
    color: #6c757d;
}
</style>
{% endblock %}
