{% extends "base.html" %}

{% block title %}{% if category %}编辑{% else %}添加{% endif %}分类 - AI棱镜{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3">
                    <h5 class="mb-0">{% if category %}编辑{% else %}添加{% endif %}分类</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">分类名称</label>
                            <input type="text" name="name" class="form-control" value="{{ category.name if category else '' }}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Slug</label>
                            <input type="text" name="slug" class="form-control" value="{{ category.slug if category else '' }}" required>
                            <small class="text-muted">用于URL的唯一标识</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea name="description" class="form-control" rows="3">{{ category.description if category else '' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">图标</label>
                            <input type="text" name="icon" class="form-control" value="{{ category.icon if category else '' }}" placeholder="bi-folder">
                            <small class="text-muted">Bootstrap Icons 类名，如 bi-folder</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">排序</label>
                            <input type="number" name="sort_order" class="form-control" value="{{ category.sort_order if category else 0 }}">
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{{ url_for('admin.knowledge') }}" class="btn btn-secondary">取消</a>
                            <button type="submit" class="btn btn-primary">保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
