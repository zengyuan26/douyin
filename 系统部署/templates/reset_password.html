<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - AI棱镜</title>
    <!-- Bootstrap 5.3.0 CSS (SRI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
          crossorigin="anonymous">
    <!-- Bootstrap Icons 1.11.0 (SRI) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
          rel="stylesheet"
          integrity="sha384-QuGBSgV5Im3DzL2z+8Ko9/hqNy/N0p6S4OXu4z/68SIy3Te4Bkz/68SIy3Te4Bkz"
          crossorigin="anonymous">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .reset-card {
            background: #ffffff;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
        }
        
        .reset-header {
            padding: 28px 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }
        
        .reset-header .logo {
            width: 44px;
            height: 44px;
            background: #007aff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 10px;
        }
        
        .reset-header .logo i {
            font-size: 22px;
            color: white;
        }
        
        .reset-header h4 {
            font-size: 20px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 2px;
        }
        
        .reset-header p {
            color: #86868b;
            font-size: 13px;
        }
        
        .reset-body {
            padding: 20px 24px;
        }
        
        .form-control {
            border: 1px solid rgba(0,0,0,0.12);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            background: #fafafa;
            color: #1d1d1f;
            transition: all 0.2s;
        }
        
        .form-control::placeholder {
            color: #a1a1a6;
        }
        
        .form-control:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.15);
            background: #ffffff;
            color: #1d1d1f;
        }
        
        .form-label {
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
            font-size: 13px;
        }
        
        .success-box {
            background: #dafbe4;
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        
        .success-box i {
            font-size: 32px;
            color: #34c759;
        }
        
        .success-box p {
            color: #34c759;
            font-size: 13px;
            margin: 8px 0 0;
        }
        
        .btn-submit {
            background: #007aff;
            border: none;
            border-radius: 10px;
            padding: 12px 20px;
            font-weight: 500;
            font-size: 14px;
            width: 100%;
            color: white;
            transition: all 0.2s;
        }
        
        .btn-submit:hover {
            background: #0077ed;
        }
        
        .alert {
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            margin-bottom: 16px;
            border: none;
        }
        
        .alert-danger {
            background: #ffebe9;
            color: #ff3b30;
        }
        
        .alert-success {
            background: #dafbe4;
            color: #34c759;
        }
        
        .btn-link-custom {
            color: #007aff;
            text-decoration: none;
            font-size: 13px;
        }
        
        .btn-link-custom:hover {
            color: #0077ed;
        }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="reset-header">
            <div class="logo">
                <i class="bi bi-shield-check"></i>
            </div>
            <h4>重置密码</h4>
            <p>身份验证通过，请设置新密码</p>
        </div>
        
        <div class="reset-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" role="alert">
                            <i class="bi bi-{{ 'exclamation-triangle-fill' if category == 'danger' else 'check-circle-fill' if category == 'success' else 'info-circle-fill' }} me-2"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">新密码</label>
                    <input type="password" name="password" class="form-control" placeholder="请输入新密码" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">确认新密码</label>
                    <input type="password" name="confirm_password" class="form-control" placeholder="请再次输入新密码" required>
                </div>
                <button type="submit" class="btn btn-primary btn-submit">
                    确认重置
                </button>
            </form>
            
            <div class="text-center mt-4">
                <a href="{{ url_for('auth.login') }}" class="btn-link-custom">
                    <i class="bi bi-arrow-left me-1"></i>返回登录
                </a>
            </div>
        </div>
    </div>
</body>
</html>
