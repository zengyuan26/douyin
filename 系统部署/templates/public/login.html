<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI 棱镜</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .login-card h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .login-card .subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 2rem;
        }

        .form-control, .form-select {
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .form-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .form-link a {
            color: var(--primary);
            text-decoration: none;
        }

        .form-link a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>AI 棱镜</h2>
        <p class="subtitle">AI时代创作者的内容生产引擎</p>
        <p class="subtitle">登录您的账号</p>

        <div id="alert-box" class="alert alert-danger" style="display: none;"></div>

        <form id="login-form">
            <div class="mb-3">
                <label class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" required
                       placeholder="your@email.com">
            </div>

            <div class="mb-3">
                <label class="form-label">密码</label>
                <input type="password" class="form-control" id="password" required
                       placeholder="••••••••">
            </div>

            <div class="mb-3 text-end">
                <a href="/public/forgot-password" style="color: var(--primary);">忘记密码？</a>
            </div>

            <button type="submit" class="btn btn-primary w-100" id="btn-submit">
                登录
            </button>
        </form>

        <div class="form-link">
            还没有账号？<a href="/public/register">立即注册</a>
        </div>

        <hr class="my-4">

        <div class="text-center">
            <a href="/public" class="text-muted">← 返回首页</a>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');

            if (!email || !password) {
                showAlert('请填写邮箱和密码');
                return;
            }

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const resp = await fetch('/public/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, password })
                });

                const data = await resp.json();

                if (data.success) {
                    // 登录成功，跳转
                    window.location.href = '/public';
                } else {
                    showAlert(data.message || '登录失败');
                    btn.disabled = false;
                    btn.textContent = '登录';
                }
            } catch (e) {
                showAlert('登录失败，请稍后重试');
                btn.disabled = false;
                btn.textContent = '登录';
            }
        });

        function showAlert(message) {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
