<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - AI 棱镜</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-dark: #4338CA;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .register-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .register-card h2 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .register-card .subtitle {
            text-align: center;
            color: #6B7280;
            margin-bottom: 2rem;
        }

        .form-control, .form-select {
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .btn-primary {
            background: var(--primary);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .form-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .form-link a {
            color: var(--primary);
            text-decoration: none;
        }

        .form-link a:hover {
            text-decoration: underline;
        }

        .alert {
            border-radius: 8px;
        }

        .success-card {
            text-align: center;
            padding: 2rem;
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="register-card" id="register-card">
        <h2>AI 棱镜</h2>
        <p class="subtitle">AI时代创作者的内容生产引擎</p>
        <p class="subtitle">创建您的账号</p>

        <div id="alert-box" class="alert alert-danger" style="display: none;"></div>

        <form id="register-form">
            <div class="mb-3">
                <label class="form-label" for="email">邮箱</label>
                <input type="email" class="form-control" id="email" required
                       placeholder="your@email.com">
            </div>

            <div class="mb-3">
                <label class="form-label" for="nickname">昵称（可选）</label>
                <input type="text" class="form-control" id="nickname"
                       placeholder="您希望我们怎么称呼您">
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">密码</label>
                <input type="password" class="form-control" id="password" required
                       placeholder="至少6位密码" minlength="6">
            </div>

            <div class="mb-3">
                <label class="form-label" for="confirm-password">确认密码</label>
                <input type="password" class="form-control" id="confirm-password" required
                       placeholder="再次输入密码" minlength="6">
            </div>

            <button type="submit" class="btn btn-primary w-100" id="btn-submit">
                注册
            </button>
        </form>

        <div class="form-link">
            已有账号？<a href="/public/login">立即登录</a>
        </div>

        <hr class="my-4">

        <div class="text-center">
            <a href="/public" class="text-muted">← 返回首页</a>
        </div>
    </div>

    <!-- 注册成功提示 -->
    <div class="register-card success-card" id="success-card" style="display: none;">
        <div class="success-icon">📧</div>
        <h3>注册成功！</h3>
        <p class="text-muted mt-3">我们已向您的邮箱发送了验证链接<br>请查收邮件完成验证</p>
        <div class="mt-4">
            <a href="/public/login" class="btn btn-primary">去登录</a>
        </div>
        <div class="mt-3">
            <a href="#" onclick="resendVerification()" style="color: var(--primary);">
                没收到邮件？重新发送
            </a>
        </div>
    </div>

    <script>
        let registeredEmail = '';

        document.getElementById('register-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const btn = document.getElementById('btn-submit');

            if (!email) {
                showAlert('请填写邮箱');
                return;
            }

            if (!password || password.length < 6) {
                showAlert('密码至少6位');
                return;
            }

            if (password !== confirmPassword) {
                showAlert('两次密码输入不一致');
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const resp = await fetch('/public/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email, nickname, password })
                });

                const data = await resp.json();

                if (data.success) {
                    registeredEmail = email;
                    document.getElementById('register-card').style.display = 'none';
                    document.getElementById('success-card').style.display = 'block';
                } else {
                    showAlert(data.message || '注册失败');
                    btn.disabled = false;
                    btn.textContent = '注册';
                }
            } catch (e) {
                showAlert('注册失败，请稍后重试');
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });

        async function resendVerification() {
            if (!registeredEmail) {
                registeredEmail = document.getElementById('email').value.trim();
            }

            try {
                const resp = await fetch('/public/api/resend-verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ email: registeredEmail })
                });

                const data = await resp.json();
                alert(data.message || (data.success ? '验证邮件已重新发送' : '发送失败'));
            } catch (e) {
                alert('发送失败，请稍后重试');
            }
        }

        function showAlert(message) {
            const alertBox = document.getElementById('alert-box');
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => {
                alertBox.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
