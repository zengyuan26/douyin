<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=1080,height=1920"><title>结尾</title><style>* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif; background:#2D2B55; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.page { width:1080px; height:1920px; background:#FFF9F5; overflow:hidden; position:relative; flex-shrink:0; }
.page { background:linear-gradient(170deg,#FFFBF5 0%,#FFF8F0 50%,#FFEDE0 100%); }
.header { padding:55px 60px 0;text-align:center; }
.icon { width:96px;height:96px;border-radius:26px;background:linear-gradient(135deg,#8D6E63,#D4A574);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;box-shadow:0 8px 28px rgba(139,109,83,0.2);font-size:42px;color:white;font-weight:700; }
.h1 { font-size:54px;font-weight:800;color:#333333;line-height:1.3;margin-bottom:14px; }
.sub { font-size:30px;color:#888;margin-bottom:14px; }
.div { width:100px;height:4px;background:linear-gradient(90deg,transparent,#8D6E63,transparent);margin:0 auto 28px;border-radius:2px; }
.points { display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin:0 50px 28px; }
.point { background:white;border-radius:16px;padding:16px 26px;font-size:25px;font-weight:600;color:#333333;box-shadow:0 3px 12px rgba(139,109,83,0.08); }
.myth { margin:0 50px 28px;background:linear-gradient(135deg,rgba(139,109,83,0.08),rgba(255,152,0,0.06));border-radius:20px;padding:26px 32px; }
.mtitle { font-size:23px;color:#8D6E63;font-weight:700;margin-bottom:14px; }
.mitem { font-size:25px;color:#333333;line-height:1.9;position:relative;padding-left:20px; }
.mitem::before { content:"- ";position:absolute;left:0;color:#FF9800;font-weight:700; }
.ixt { margin:0 50px 28px;background:linear-gradient(135deg,#FF9800,#FF6B35);border-radius:20px;padding:28px 34px;text-align:center; }
.il { font-size:21px;color:rgba(255,255,255,0.85);margin-bottom:10px; }
.iq { font-size:30px;font-weight:700;color:white;margin-bottom:6px; }
.iq2 { font-size:24px;color:rgba(255,255,255,0.9);margin-bottom:14px; }
.ia { display:inline-block;background:white;color:#FF9800;font-size:23px;font-weight:700;padding:13px 34px;border-radius:28px; }
.col { margin:0 50px;text-align:center;padding:20px;background:rgba(76,175,80,0.08);border-radius:16px;border:1px dashed #4CAF50; }
.col p { font-size:23px;color:#4CAF50;font-weight:600; }</style></head><body>
<div class="page">
  <div class="header">
    <div class="icon">肠</div>
    <h1 class="h1">香肠不是大菜才吃</h1>
    <p class="sub">日常一餐也合适</p>
    <div class="div"></div>
  </div>
  <div class="points">
    <span class="point">10分钟出锅</span>
    <span class="point">比外卖快</span>
    <span class="point">比外卖香</span>
  </div>
  <div class="myth">
    <p class="mtitle">打破一个误区</p>
    <p class="mitem">以前总觉得香肠是冬天灌的</p>
    <p class="mitem">是过年才吃的大菜</p>
    <p class="mitem">其实备好在冰箱里</p>
    <p class="mitem">下班随时蒸一截，比什么都方便</p>
  </div>
  <div class="ixt">
    <p class="il">互动时间</p>
    <p class="iq">你们家香肠一般怎么吃？</p>
    <p class="iq2">有没有什么懒人神仙搭配？</p>
    <span class="ia">评论区分享一下</span>
  </div>
  <div class="col"><p>收藏起来，下班不知道吃什么时用得上</p></div>
</div></body></html>
