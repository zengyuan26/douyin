<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=1080,height=1920"><title>封面</title><style>* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",sans-serif; background:#2D2B55; display:flex; justify-content:center; align-items:center; min-height:100vh; }
.page { width:1080px; height:1920px; background:#FFF9F5; overflow:hidden; position:relative; flex-shrink:0; }
.page { background:linear-gradient(160deg,#FFF8F0 0%,#FFEDE0 40%,#FFE4CC 100%); }
.scene-bg { position:absolute;inset:0; background:radial-gradient(ellipse at 30% 85%,rgba(139,109,83,0.1) 0%,transparent 55%), radial-gradient(ellipse at 75% 25%,rgba(255,152,0,0.07) 0%,transparent 45%); }
.header-bar { position:absolute;top:0;left:0;right:0;height:5px; background:linear-gradient(90deg,#8D6E63,#FF6B35); }
.brand { position:absolute;top:36px;left:50px; display:flex;align-items:center;gap:10px; background:rgba(139,109,83,0.1);padding:8px 20px;border-radius:22px; }
.brand-dot { width:9px;height:9px;border-radius:50%;background:#8D6E63; }
.content { position:absolute;top:220px;left:0;right:0;text-align:center;padding:0 60px; }
.hook { display:inline-block; background:linear-gradient(135deg,#FF9800,#FF6B35); color:white; font-size:22px;font-weight:700; padding:10px 36px;border-radius:30px;margin-bottom:28px;letter-spacing:4px; }
.title { font-size:70px;font-weight:800;color:#333333;line-height:1.2;margin-bottom:16px;letter-spacing:2px; }
.title em { font-style:normal;color:#8D6E63; }
.sub { font-size:30px;color:#333333;margin-bottom:12px;font-weight:400; }
.divider { width:120px;height:3px;background:linear-gradient(90deg,transparent,#8D6E63,transparent);margin:28px auto; }
.time { display:flex;align-items:center;justify-content:center;gap:12px;margin:36px 0; }
.num { font-size:96px;font-weight:900;color:#FF9800;line-height:1; text-shadow:3px 5px 0 rgba(255,152,0,0.12); }
.unit { font-size:34px;font-weight:700;color:#FF9800;align-self:flex-end;padding-bottom:14px; }
.desc { font-size:26px;color:#333333;font-weight:500; }
.sausage { position:absolute;bottom:400px;left:50%;transform:translateX(-50%); width:320px;height:70px;border-radius:50px; background:linear-gradient(145deg,#FF6B35,#8D6E63); box-shadow:0 18px 50px rgba(139,109,83,0.28); }
.sausage::after { content:"";position:absolute;inset:0;border-radius:50px;background:repeating-linear-gradient(90deg,transparent,transparent 28px,rgba(255,255,255,0.06) 28px,rgba(255,255,255,0.06) 34px); }
.steam { position:absolute;bottom:490px;left:50%;transform:translateX(-50%);display:flex;gap:50px; }
.steam span { width:4px;height:55px;background:linear-gradient(to top,rgba(139,109,83,0.22),transparent);border-radius:4px; animation:rise 2.5s ease-in-out infinite; }
.steam span:nth-child(2) { animation-delay:0.6s;height:45px; }
.steam span:nth-child(3) { animation-delay:1.2s;height:50px; }
@keyframes rise { 0%,100%{transform:translateY(0) scaleX(1);opacity:0.4} 50%{transform:translateY(-15px) scaleX(1.4);opacity:0.1} }
.bottom { position:absolute;bottom:70px;left:50px;right:50px;background:rgba(255,255,255,0.93);border-radius:20px;padding:24px 32px; box-shadow:0 4px 20px rgba(139,109,83,0.1);border:1px solid rgba(139,109,83,0.07); }
.cta { display:flex;align-items:center;justify-content:space-between; }
.cta-l { display:flex;align-items:center;gap:12px;font-size:23px;color:#333333; }
.cta-icon { width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#FF9800,#FF6B35);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:700;flex-shrink:0; }
.tag { background:linear-gradient(135deg,#8D6E63,#D4A574);color:white;font-size:22px;font-weight:600;padding:9px 26px;border-radius:25px; }
.corner { position:absolute;width:80px;height:80px;opacity:0.1; }
.corner.tl { top:16px;left:16px;border-top:3px solid #8D6E63;border-left:3px solid #8D6E63; }
.corner.tr { top:16px;right:16px;border-top:3px solid #8D6E63;border-right:3px solid #8D6E63; }
.corner.bl { bottom:16px;left:16px;border-bottom:3px solid #8D6E63;border-left:3px solid #8D6E63; }
.corner.br { bottom:16px;right:16px;border-bottom:3px solid #8D6E63;border-right:3px solid #8D6E63; }</style></head><body>
<div class="page">
  <div class="scene-bg"></div>
  <div class="header-bar"></div>
  <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
  <div class="brand"><div class="brand-dot"></div><span style="font-size:20px;color:#8D6E63;font-weight:600;">南漳黄姐灌香肠</span></div>
  <div class="content">
    <div class="hook">10分钟快手家常菜</div>
    <h1 class="title">下班懒得做饭？</h1>
    <p class="sub">蒸一截香肠</p>
    <div class="divider"></div>
    <div class="time"><span class="num">10</span><span class="unit">分钟</span></div>
    <p class="desc">比外卖快，比外卖香，比外卖省钱</p>
  </div>
  <div class="steam"><span></span><span></span><span></span></div>
  <div class="sausage"></div>
  <div class="bottom">
    <div class="cta">
      <div class="cta-l"><div class="cta-icon">藏</div><span>收藏起来，下班不知道吃什么时用得上</span></div>
      <div class="tag">懒人必备</div>
    </div>
  </div>
</div></body></html>
